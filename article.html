<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 岳阳县二中学生记者社</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --blue-900:#142D52;--blue-700:#1E4D8C;--blue-500:#2B6CB0;--blue-50:#EDF4FB;
            --coral-500:#E2584A;
            --gray-900:#1A1A1A;--gray-700:#4A4A4A;--gray-500:#888;--gray-100:#F0EFED;--gray-50:#FAF8F5;
            --color-bg:var(--gray-50);--color-surface:#fff;--color-text:var(--gray-900);
            --color-text-soft:var(--gray-700);--color-text-muted:var(--gray-500);--color-border:var(--gray-100);
            --text-xs:.75rem;--text-sm:.875rem;--text-base:1rem;--text-lg:1.125rem;
            --text-xl:1.25rem;--text-2xl:1.5rem;--text-3xl:2rem;
            --space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:32px;--space-2xl:48px;--space-3xl:64px;
            --radius-md:10px;--radius-lg:16px;--radius-full:9999px;
            --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.06);
            --ease-out:cubic-bezier(.16,1,.3,1);--duration:.3s;--nav-height:64px;
        }
        *,*::before,*::after{box-sizing:border-box 0;padding:0}
        html{scroll-behavior:smooth;font-size:16px}
        body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",-apple-system,sans-serif;color:var(--color-text);background:var(--color-bg);line-height:1.85;-webkit-font-smoothing:antialiased}
        a{color:inherit;text-decoration:none}ul{list-style:none}button{font-family:inherit;cursor:pointer}
        .container{max-width:1200px;margin:0 auto;padding:0 var(--space-lg)}
        .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-height);background:rgba(15,35,71,.95)}
        .nav-container{max-width:1200px;margin:0 auto;padding:0 var(--space-lg);height:100%;display:flex;align-items:center;justify-content:space-between}
        .nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:var(--text-base);color:#fff}
        .logo-mark{width:36px;height:36px;border-radius:var(--radius-md);flex-shrink:0;overflow:hidden}
        .logo-mark img{width:100%;height:100%;object-fit:cover;display:block}
        .nav-menu{display:flex;align-items:center;gap:2px}
        .nav-link{padding:8px 14px;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:500;color:rgba(255,255,255,.85);transition:all .15s}
        .nav-link:hover{color:#fff;background:rgba(255,255,255,.12)}
        .nav-link.active{color:#fff;background:rgba(255,255,255,.18);font-weight:600}
        .nav-link.nav-cta{background:var(--coral-500)!important;color:#fff!important;padding:8px 18px;font-weight:600;margin-left:6px}
        .nav-toggle{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:8px;cursor:pointer;z-index:1001}
        .nav-toggle span{display:block;width:24px;height:2.5px;background:#fff;border-radius:2px}
        .nav-toggle.active span:nth-child(1){transform:translateY(7px)rotate(45deg)}
        .nav-toggle.active span:nth-child(2){opacity:0}
        .nav-toggle.active span:nth-child(3){transform:translateY(-7px)rotate(-45deg)}
        .article-wrapper{max-width:800px;margin:0 auto;padding:120px var(--space-lg) var(--space-3xl)}
        .article-header{margin-bottom:var(--space-xl);animation:slideUp .5s var(--ease-out) both}
        .article-category{display:inline-flex;font-size:var(--text-xs);font-weight:600;color:var(--blue-700);background:var(--blue-50);padding:4px 12px;border-radius:var(--radius-full);margin-bottom:var(--space-md)}
        .article-title{font-size:var(--text-3xl);font-weight:800;line-height:1.3;margin-bottom:var(--space-md);color:var(--gray-900);letter-spacing:-.5px}
        .article-meta{display:flex;gap:var(--space-lg);flex-wrap:wrap;font-size:var(--text-sm);color:var(--text-muted);padding-bottom:var(--space-lg);border-bottom:1px solid var(--color-border)}
        .article-cover{width:100%;border-radius:var(--radius-lg);margin-bottom:var(--space-xl);box-shadow:var(--shadow-md);animation:slideUp .5s .1s var(--ease-out) both}
        .article-content{font-size:var(--text-base);line-height:1.9;color:var(--color-text);animation:slideUp .5s .2s var(--ease-out) both}
        .article-content p{margin-bottom:var(--space-md)}
        .article-content h2{font-size:var(--text-2xl);font-weight:700;margin:var(--space-2xl) 0 var(--space-md);color:var(--blue-900)}
        .article-content h3{font-size:var(--text-xl);font-weight:700;margin:var(--space-xl) 0 var(--space-sm)}
        .article-content img{max-width:100%;border-radius:var(--radius-md);margin:var(--space-md) 0}
        .article-content strong{color:var(--blue-900)}
        .article-content blockquote{border-left:4px solid var(--blue-500);padding-left:var(--space-md);margin:var(--space-md) 0;color:var(--text-soft);font-style:italic;background:var(--blue-50);padding:var(--space-md);border-radius:0 var(--radius-md) var(--radius-md) 0}
        .back-link{display:inline-flex;align-items:center;gap:6px;margin-top:var(--space-2xl);padding:10px 20px;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:600;background:var(--blue-50);color:var(--blue-700);transition:all var(--duration);animation:slideUp .5s .3s var(--ease-out) both}
        .back-link:hover{background:var(--blue-500);color:#fff}
        @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        .loading-box{text-align:center;padding:80px 20px}
        .spinner{width:36px;height:36px;margin:0 auto var(--space-md);border:3px solid var(--gray-100);border-top-color:var(--blue)-500);border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .footer{background:var(--blue-900);color:rgba(255,255,255,.7);padding:var(--space-3xl) 0 var(--space-lg);text-align:center}
        .footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:var(--space-lg);font-size:var(--text-xs);color:rgba(255,255,255,.35)}
        @media(max-width:768px){
            .nav-toggle{display:flex}
            .nav-menu{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.97);flex-direction:column;align-items:center;justify-content:center;gap:var(--space-md);z-index:1000;padding:var(--space-xl)}
            .nav-menu.active{display:flex}
            .nav-menu .nav-link{font-size:var(--text-lg);color:var(--gray-700)!important;padding:12px 24px}
            .nav-menu .nav-link.nav-cta{background:var(--coral-500)!important;color:#fff!important;margin-left:0}
            .article-title{font-size:1.6rem}
            .article-wrapper{padding:100px var(--space-md) var(--space-2xl)}
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <div class="logo-mark"><img src="https://s41.ax1x.com/2026/07/05/pm0HYZV.png" alt="记者社"></div>
                <span>岳阳县二中学生记者社</span>
            </a>
            <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">首页</a></li>
                <li><a href="news.html" class="nav-link active">校园新闻</a></li>
                <li><a href="recruitment.html" class="nav-link nav-cta">🔥 加入我们</a></li>
                <li><a href="about.html" class="nav-link">关于记者社</a></li>
            </ul>
        </div>
    </nav>
    <main class="article-wrapper" id="articleWrapper">
        <div class="loading-box"><div class="spinner"></div><p style="color:var(--text-muted);">加载文章中...</p></div>
    </main>
    <footer class="footer"><div class="container"><div class="footer-bottom"><p>© 2026 岳阳县二中学生记者社</p></div></div></footer>
    <script>
        var supabase = window.supabase.createClient('https://dhwgxuvkwjqkwgetezun.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRod2d4dXZrd2pxa3dnZXRlenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTU4NDksImV4cCI6MjA5ODc3MTg0OX0.xbeSSfXk6_mdKN-9B1B0MByiFrXIntcNDlJS1XAnlrs');
        var navToggle=document.getElementById('navToggle'),navMenu=document.getElementById('navMenu');
        navToggle.addEventListener('click',function(){navToggle.classList.toggle('active');navMenu.classList.toggle('active')});
        navMenu.querySelectorAll('.nav-link').forEach(function(l){l.addEventListener('click',function(){navMenu.classList.remove('active');navToggle.classList.remove('active')})});
        var params=new URLSearchParams(window.location.search),id=params.get('id'),wrapper=document.getElementById('articleWrapper');
        if(!id){wrapper.innerHTML='<div class="loading-box"><p style="font-size:2rem;">❌</p><p style="color:var(--text-soft);">缺少文章ID</p><a href="news.html" class="back-link">← 返回文章列表</a></div>'}

        else{supabase.from('articles').select('*').eq('id',id).eq('published',true).single().then(function(r){
            if(r.error||!r.data){wrapper.innerHTML='<div class="loading-box"><p style="font-size:2rem;">😵</p><p style="color:#dc2626;">文章不存在或已下架</p><a href="news.html" class="back-link">← 返回文章列表</a></div>';return}
            var a=r.data;document.title=a.title+' - 岳阳县二中学生记者社';
            var d=new Date(a.created_at),ds=d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
            wrapper.innerHTML='<article><header class="article-header"><span class="article-category">'+esc(a.category||'校园新闻')+'</span><h1 class="article-title">'+esc(a.title)+'</h1><div class="article-meta"><span>✍️ '+esc(a.author||'记者社')+'</span><span>📅 '+ds+'</span></div></header>'+(a.cover_image?'<img src="'+esc(a.cover_image)+'" alt="'+esc(a.title)+'" class="article-cover" onerror="this.style.display=\'none\'">':'')+'<div class="article-content">'+(a.content||'<p>暂无内容</p>')+'</div><a href="news.html" class="back-link">← 返回文章列表</a></article>';
        })}function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
    </script>
</body>
</html>
