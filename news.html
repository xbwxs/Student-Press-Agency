<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园新闻 - 岳阳县二中学生记者社</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --blue-900:#142D52;--blue-700:#1E4D8C;--blue-500:#2B6CB0;--blue-50:#EDF4FB;
            --coral-500:#E2584A;--coral-400:#EC7A6F;
            --gray-900:#1A1A1A;--gray-700:#4A4A4A;--gray-500:#888;--gray-100:#F0EFED;--gray-50:#FAF8F5;
            --color-bg:var(--gray-50);--color-surface:#fff;--color-text:var(--gray-900);
            --color-text-soft:var(--gray-700);--color-text-muted:var(--gray-500);--color-border:var(--gray-100);
            --text-xs:.75rem;--text-sm:.875rem;--text-base:1rem;--text-lg:1.125rem;
            --text-xl:1.25rem;--text-2xl:1.5rem;--text-3xl:2rem;
            --space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:32px;--space-2xl:48px;--space-3xl:64px;--space-4xl:96px;
            --radius-md:10px;--radius-lg:16px;--radius-full:9999px;
            --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.06);
            --shadow-lg:0 12px 32px rgba(0,0,0,.08);
            --ease-out:cubic-bezier(.16,1,.3,1);--duration:.3s;--nav-height:64px;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth;font-size:16px}
        body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",-apple-system,sans-serif;color:var(--color-text);background:var(--color-bg);line-height:1.75;-webkit-font-smoothing:antialiased}
        a{color:inherit;text-decoration:none}ul{list-style:none}button{font-family:inherit;cursor:pointer}
        .container{max-width:1200px;margin:0 auto;padding:0 var(--space-lg)}
        .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-height);background:rgba(15,35,71,.95)}
        .nav-container{max-width:1200px;margin:0 auto;padding:0 var(--space-lg);height:100%;display:flex;align-items:center;justify-content:space-between}
        .nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:var(--text-base);color:#fff}
        .logo-mark{width:36px;height:36px;border-radius:var(--radius-md);flex-shrink:0;overflow:hidden}
        .logo-mark img{width:100%;height:100%;object-fit:cover;display:block}
        .nav-menu{display:flex;align-items:center;gap:2px}
        .nav-link{padding:8px 14px;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:500;color:rgba(255,255,255,.85);transition:all .15s}
        .nav-link:hover{color:#fff;background:rgba(255,255,255,.12)}
        .nav-link.active{color:#fff;background:rgba(255,255,255,.18);font-weight:600}
        .nav-link.nav-cta{background:var(--coral-500)!important;color:#fff!important;padding:8px 18px;font-weight:600;margin-left:6px}
        .nav-toggle{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:8px;cursor:pointer;z-index:1001}
        .nav-toggle span{display:block;width:24px;height:2.5px;background:#fff;border-radius:2px}
        .nav-toggle.active span:nth-child(1){transform:translateY(7px)rotate(45deg)}
        .nav-toggle.active span:nth-child(2){opacity:0}
        .nav-toggle.active span:nth-child(3){transform:translateY(-7px)rotate(-45deg)}
        .page-header{padding:140px 0 56px;background:linear-gradient(160deg,#0F2347,#1E4D8C);color:#fff;text-align:center;position:relative;overflow:hidden}
        .page-header::before{content:'';position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(240,160,75,.18),transparent 70%);top:-70px;right:-70px;animation:floatOrb1 12s ease-in-out infinite;z-index:0}
        .page-header::after{content:'';position:absolute;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(226,88,74,.12),transparent 70%);bottom:-50px;left:-50px;animation:floatOrb2 14s ease-in-out infinite reverse;z-index:0}
        @keyframes floatOrb1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(35px,-25px) scale(1.15)}66%{transform:translate(-20px,20px) scale(.9)}}
        @keyframes floatOrb2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-30px,20px) scale(1.1)}66%{transform:translate(25px,-15px) scale(.85)}}
        .page-header h1{font-size:2.5rem;font-weight:800;margin-bottom:var(--space-sm);position:relative;z-index:1;animation:fadeInDown .6s var(--ease-out) both}
        .page-header p{font-size:var(--text-lg);opacity:0;position:relative;z-index:1;animation:fadeInUp .6s .15s var(--ease-out) forwards}
        @keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .section{padding:var(--space-4xl) 0}
        .news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:var(--space-lg)}
        .news-card{background:var(--color-surface);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--color-border);transition:all var(--duration) var(--ease-out);cursor:pointer;display:flex;flex-direction:column;animation:slideUp .5s var(--ease-out) both}
        .news-card:nth-child(1){animation-delay:.1s}.news-card:nth-child(2){animation-delay:.2s}.news-card:nth-child(3){animation-delay:.3s}.news-card:nth-child(4){animation-delay:.4s}.news-card:nth-child(5){animation-delay:.5s}.news-card:nth-child(6){animation-delay:.6s}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .news-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);border-color:var(--blue-500)}
        .news-card-img{width:100%;height:200px;background:linear-gradient(135deg,#E8EEF5,#D5DFEA);display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden}
        .news-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease-out)}
        .news-card:hover .news-card-img img{transform:scale(1.06)}
        .news-card-body{padding:var(--space-lg);flex:1;display:flex;flex-direction:column}
        .news-card-tag{display:inline-flex;font-size:var(--text-xs);font-weight:600;color:var(--blue-700);background:var(--blue-50);padding:3px 10px;border-radius:var(--radius-full);width:fit-content;margin-bottom:var(--space-sm)}
        .news-card h3{font-size:var(--text-base);font-weight:700;line-height:1.4;margin-bottom:var(--space-sm);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .news-card-excerpt{font-size:var(--text-sm);color:var(--text-soft);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
        .news-card-meta{display:flex;gap:var(--space-md);margin-top:var(--space-md);padding-top:var(--space-md);border-top:1px solid var(--color-border);font-size:var(--text-xs);color:var(--text-muted)}
        .skeleton{pointer-events:none;animation:none!important}
        .skeleton .news-card-img{background:linear-gradient(90deg,#e8edf3 25%,#f0f4f8 50%,#e8edf3 75%);background-size:200% 100%;animation:shimmer 1.8s infinite}
        .sk-line{height:14px;border-radius:4px;background:linear-gradient(90deg,#e8edf3 25%,#f0f4f8 50%,#e8edf3 75%);background-size:200% 100%;animation:shimmer 1.8s infinite;margin-bottom:10px}
        .sk-line.short{width:55%}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .footer{background:var(--blue-900);color:rgba(255,255,255,.7);padding:var(--space-3xl) 0 var(--space-lg);text-align:center}
        .footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:var(--space-lg);font-size:var(--text-xs);color:rgba(255,255,255,.35)}
        @media(max-width:768px){
            .nav-toggle{display:flex}
            .nav-menu{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.97);flex-direction:column;align-items:center;justify-content:center;gap:var(--space-md);z-index:1000;padding:var(--space-xl)}
            .nav-menu.active{display:flex}
            .nav-menu .nav-link{font-size:var(--text-lg);color:var(--gray-700)!important;padding:12px 24px}
            .nav-menu .nav-link.nav-cta{background:var(--coral-500)!important;color:#fff!important;margin-left:0}
            .news-grid{grid-template-columns:1fr}
            .page-header h1{font-size:2rem}
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <div class="logo-mark"><img src="https://s41.ax1x.com/2026/07/05/pm0HYZV.png" alt="记者社"></div>
                <span>岳阳县二中学生记者社</span>
            </a>
            <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">首页</a></li>
                <li><a href="news.html" class="nav-link active">校园新闻</a></li>
                <li><a href="recruitment.html" class="nav-link nav-cta">🔥 加入我们</a></li>
                <li><a href="about.html" class="nav-link">关于记者社</a></li>
            </ul>
        </div>
    </nav>
    <div class="page-header"><h1>📰 校园新闻</h1><p>记录校园生活的每一个精彩瞬间</p></div>
    <section class="section">
        <div class="container">
            <div class="news-grid" id="newsGrid">
                <div class="news-card skeleton"><div class="news-card-img"></div><div class="news-card-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
                <div class="news-card skeleton"><div class="news-card-img"></div><div class="news-card-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
                <div class="news-card skeleton"><div class="news-card-img"></div><div class="news-card-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
            </div>
        </div>
    </section>
    <footer class="footer"><div class="container"><div class="footer-bottom"><p>© 2026 岳阳县二中学生记者社</p></div></div></footer>
    <script>
        var supabase = window.supabase.createClient('https://dhwgxuvkwjqkwgetezun.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRod2d4dXZrd2pxa3dnZXRlenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTU4NDksImV4cCI6MjA5ODc3MTg0OX0.xbeSSfXk6_mdKN-9B1B0MByiFrXIntcNDlJS1XAnlrs');
        var navToggle=document.getElementById('navToggle'),navMenu=document.getElementById('navMenu');
        navToggle.addEventListener('click',function(){navToggle.classList.toggle('active');navMenu.classList.toggle('active')});
        navMenu.querySelectorAll('.nav-link').forEach(function(l){l.addEventListener('click',function(){navMenu.classList.remove('active');navToggle.classList.remove('active')})});
        supabase.from('articles').select('id,title,excerpt,cover_image,category,author,created_at').eq('published',true).order('created_at',{ascending:false}).then(function(r){
            var grid=document.getElementById('newsGrid');
            if(r.error||!r.data||r.data.length===0){grid.innerHTML='<div class="news-card" style="padding:48px;text-align:center;grid-column:1/-1;"><p style="font-size:2rem;">📭</p><p style="color:var(--text-soft);">暂无文章</p></div>';return}
            var html='';
            r.data.forEach(function(a,i){
                html+='<article class="news-card" style="animation-delay:'+(i*0.1)+'s" onclick="location.href=\'article.html?id='+a.id+'\'">';
                html+='<div class="news-card-img">'+(a.cover_image?'<img src="'+a.cover_image+'" alt="'+a.title+'">':'<span style="font-size:3rem;">📰</span>')+'</div>';
                html+='<div class="news-card-body"><span class="news-card-tag">'+(a.category||'校园新闻')+'</span>';
                html+='<h3>'+a.title+'</h3><p class="news-card-excerpt">'+(a.excerpt||'')+'</p>';
                html+='<div class="news-card-meta"><span>✍️ '+(a.author||'记者社')+'</span><span>📅 '+(a.created_at||'').substring(0,10)+'</span></div>';
                html+='</div></article>';
            });
            grid.innerHTML=html;
        });
    </script>
</body>
</html>
