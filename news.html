<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --blue-900:#142D52;--blue-700:#1E4D8C;--blue-500:#2B6CB0;--blue-200:#BED9F4;--blue-50:#EDF4FB;
            --gold-500:#F0A04B;--coral-500:#E2584A;--coral-400:#EC7A6F;
            --gray-900:#1A1A1A;--gray-700:#4A4A4A;--gray-500:#888;--gray-100:#F0EFED;--gray-50:#FAF8F5;
            --color-bg:var(--gray-50);--color-surface:#fff;--color-text:var(--gray-900);
            --color-text-soft:var(--gray-700);--color-text-muted:var(--gray-500);--color-border:var(--gray-100);
            --text-xs:.75rem;--text-sm:.875rem;--text-base:1rem;--text-lg:1.125rem;
            --text-xl:1.25rem;--text-2xl:1.5rem;--text-3xl:2rem;--text-4xl:2.5rem;
            --space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:32px;--space-2xl:48px;--space-3xl:64px;--space-4xl:96px;
            --radius-sm:6px;--radius-md:10px;--radius-lg:16px;--radius-full:9999px;
            --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.06);
--shadow-lg:0 12px 32px rgba(0,0,0,.08);
            --ease-out:cubic-bezier(.16,1,.3,1);--duration:.3s;
            --nav-height:64px;--max-width:1200px;
        }
        body.dark{--color-bg:#1a1a2e;--color-surface:#16213e;--color-text:#e8e8e8;--color-text-soft:#b0b0b0;--color-text-muted:#777;--color-border:#2a2a4a}
        body.dark .navbar{background:rgba(10,15,30,.95)}
        body.dark .navbar.scrolled{background:rgba(22,33,62,.95)}
        body.dark .news-card{background:var(--color-surface);border-color:var(--color-border)}
        body.dark .search-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}.search-bar input,body.dark .search-bar select{background:#16213e;border-color:#2a2a4a;color:#e8e8e8}
        body.dark .empty-state{color:#b0b0b0}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;font-size:16px}
        body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",-apple-system,sans-serif;color:var(--color-text);background:var(--color-bg);line-height:1.75;-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-top:var(--nav-height)}
        a{color:inherit;text-decoration:none}img{max-width:100%;display:block}ul{list-style:none}button{font-family:inherit;cursor:pointer}
        .container{max-width:var(--max-width);margin:0 auto;padding:0 var(--space-lg)}
        .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-height);background:rgba(15,35,71,.95);transition:all var(--duration) var(--ease-out)}
        .navbar.scrolled{background:rgba(255,255,255,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:var(--shadow-sm)}
        .nav-container{max-width:var(--max-width);margin:0 auto;padding:0 var(--space-lg);height:100%;display:flex;align-items:center;justify-content:space-between}
        .nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:var(--text-base);color:#fff;transition:color var(--duration)}
        .navbar.scrolled .nav-logo{color:var(--blue-900)}
        .logo-mark{width:36px;height:36px;border-radius:var(--radius-md);flex-shrink:0;overflow:hidden}
        .logo-mark img{width:100%;height:100%;object-fit:cover;display:block}
        .nav-menu{display:flex;align-items:center;gap:2px}
        .nav-link{padding:8px 14px;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:500;color:rgba(255,255,255,.85);transition:all .15s}
        .navbar.scrolled .nav-link{color:var(--gray-700)}
        .nav-link:hover{color:#fff;background:rgba(255,255,255,.12)}
        .navbar.scrolled .nav-link:hover{color:var(--blue-700);background:var(--blue-50)}
        .nav-link.active{color:#fff;background:rgba(255,255,255,.18);font-weight:600}
        .navbar.scrolled .nav-link.active{color:var(--blue-700);background:var(--blue-50)}
        .nav-link.nav-cta{background:var(--coral-500)!important;color:#fff!important;padding:8px 18px;font-weight:600;margin-left:6px;box-shadow:0 2px 8px rgba(226,88,74,.35)}
        .nav-link.nav-cta:hover{background:var(--coral-400)!important;transform:translateY(-1px)}
        .nav-toggle{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:8px;cursor:pointer;z-index:1001}
        .nav-toggle span{display:block;width:24px;height:2.5px;background:#fff;border-radius:2px;transition:all var(--duration)}
        .navbar.scrolled .nav-toggle span{background:var(--gray-900)}
        .nav-toggle.active span:nth-child(1){transform:translateY(7px)rotate(45deg)}
        .nav-toggle.active span:nth-child(2){opacity:0}
        .nav-toggle.active span:nth-child(3){transform:translateY(-7px)rotate(-45deg)}
        .page-header{padding:var(--space-3xl) 0 var(--space-2xl);text-align:center;background:linear-gradient(160deg,#0F2347,#1A3A6B,#1E4D8C);color:#fff}
        .page-header h1{font-size:var(--text-3xl);font-weight:800;margin-bottom:var(--space-sm)}
        .page-header p{font-size:var(--text-lg);opacity:.75}
        .section{padding:var(--space-2xl) 0}
.search-bar input{flex:1;min-width:200px;padding:12px 16px;border:2px solid var(--color-border);border-radius:var(--radius-md);font-size:.9rem;background:var(--color-surface);color:var(--color-text)}
        .search-bar input:focus{outline:none;border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
        .search-bar select{padding:12px 14px;border:2px solid var(--color-border);border-radius:var(--radius-md);font-size:.9rem;background:var(--color-surface);color:var(--color-text);cursor:pointer}
        .news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--space-lg)}
        .news-card{background:var(--color-surface);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--color-border);transition:all var(--duration) var(--ease-out);cursor:pointer;display:flex;flex-direction:column}
        .news-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--blue-200)}
        .news-card-img{width:100%;height:180px;background:linear-gradient(135deg,#E8EEF5,#D5DFEA);display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden}
        .news-card-img img{width:100%;height:100%;object-fit:cover}
        .news-card-body{padding:var(--space-lg);flex:1;display:flex;flex-direction:column}
        .news-card-tag{display:inline-flex;font-size:var(--text-xs);font-weight:600;color:var(--blue-700);background:var(--blue-50);padding:3px 10px;border-radius:var(--radius-full);width:fit-content;margin-bottom:var(--space-sm)}
        .news-card h3{font-size:var(--text-base);font-weight:700;line-height:1.4;margin-bottom:var(--space-sm);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .news-card-excerpt{font-size:var(--text-sm);color:var(--text-soft);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
        .news-card-meta{display:flex;gap:var(--space-md);margin-top:var(--space-md);padding-top:var(--space-md);border-top:1px solid var(--color-border);font-size:var(--text-xs);color:var(--text-muted)}
        .skeleton{pointer-events:none}
        .skeleton .news-card-img{background:linear-gradient(90deg,#e8edf3 25%,#f0f4f8 50%,#e8edf3 75%);background-size:200% 100%;animation:shimmer 1.8s infinite}
        .sk-line{height:14px;border-radius:4px;background:linear-gradient(90deg,#e8edf3 25%,#f0f4f8 50%,#e8edf3 75%);background-size:200% 100%;animation:shimmer 1.8s infinite;margin-bottom:10px}
        .sk-line.short{width:55%}.sk-line.xshort{width:35%}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .empty-state{text-align:center;padding:var(--space-4xl) var(--space-lg);color:var(--color-text-soft)}
        .empty-state .icon{font-size:4rem;margin-bottom:var(--space-md)}
        .empty-state h3{font-size:var(--text-xl);margin-bottom:var(--space-xs)}
        .empty-state p{font-size:var(--text-sm);color:var(--color-text-muted)}
        .mobile-bottom-nav{display:none;position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:998;background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.10),0 0 0 1px rgba(0,0,0,.04);padding:6px 8px;gap:2px}
        .mobile-bottom-nav a{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.6rem;color:var(--gray-500);text-decoration:none;padding:6px 14px;border-radius:16px;gap:1px;transition:all .2s;min-width:52px}
        .mobile-bottom-nav a span{font-size:1.25rem;line-height:1;transition:transform .2s}
        .mobile-bottom-nav a.active{color:var(--blue-700);background:var(--blue-50);font-weight:600}
        .mobile-bottom-nav a.active span{transform:scale(1.1)}
        .mobile-bottom-nav a:active span{transform:scale(.9)}
        body.dark .mobile-bottom-nav{background:rgba(22,33,62,.94);box-shadow:0 4px 24px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.06)}
        body.dark .mobile-bottom-nav a{color:#888}
        body.dark .mobile-bottom-nav a.active{color:#93c5fd;background:rgba(59,130,246,.15)}
        #backToTop{position:fixed;bottom:80px;right:20px;z-index:999;width:44px;height:44px;border-radius:50%;background:var(--blue-700);color:#fff;border:none;font-size:1.2rem;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.25);display:none;transition:opacity .3s}
        .footer{background:var(--blue-900);color:rgba(255,255,255,.7);padding:var(--space-3xl) 0 var(--space-lg)}
        .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:var(--space-3xl);margin-bottom:var(--space-2xl)}
        .footer-col h4{color:#fff;font-size:var(--text-base);font-weight:600;margin-bottom:var(--space-md)}
        .footer-col p,.footer-col a{display:block;font-size:var(--text-sm);margin-bottom:var(--space-sm);color:rgba(255,255,255,.55);transition:color .15s}
        .footer-col a:hover{color:#fff}
        .footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:var(--space-lg);text-align:center;font-size:var(--text-xs);color:rgba(255,255,255,.35)}
        @media(max-width:768px){
            :root{--text-3xl:1.6rem;--text-4xl:2rem;--space-4xl:56px;--space-3xl:40px}
            .nav-toggle{display:flex}
            .nav-menu{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.98);flex-direction:column;align-items:center;justify-content:center;gap:var(--space-md);z-index:1000;padding:var(--space-xl)}
            .nav-menu.active{display:flex}
            .nav-menu .nav-link{font-size:1.15rem;color:var(--gray-700)!important;padding:14px 28px;border-radius:var(--radius-full);transition:background .2s}
            .nav-menu .nav-link:hover{background:var(--blue-50)}
            .nav-menu .nav-link.nav-cta{background:var(--coral-500)!important;color:#fff!important;margin-left:0}
            body.dark .nav-menu{background:rgba(15,20,40,.98)}
            body.dark .nav-menu .nav-link{color:#ccc!important}
            body.dark .nav-menu .nav-link:hover{background:rgba(255,255,255,.08)}
            .news-grid{grid-template-columns:1fr}
            .footer-grid{grid-template-columns:1fr;gap:var(--space-lg)}
            .mobile-bottom-nav{display:flex!important}
            #backToTop{bottom:100px}
        }
        @media(max-width:480px){
            .container{padding:0 var(--space-md)}
            .section{padding:var(--space-3xl) 0}
            .page-header h1{font-size:1.5rem}
        }
    </style>
</head>
<body>

                <div class="news-card skeleton"><div class="news-card-img"></div><div class="news-card-body"><div class="sk-line"></div><div class="sk-line short"></div><div class="sk-line xshort"></div></div></div>
                <div class="news-card skeleton"><div class="news-card-img"></div><div class="news-card-body"><div class="sk-line"></div><div class="sk-line short"></div><div class="sk-line xshort"></div></div></div>
                <div class="news-card skeleton"><div class="news-card-img"></div><div class="news-card-body"><div class="sk-line"></div><div class="sk-line short"></div><div class="sk-line xshort"></div></div></div>
                <div class="news-card skeleton"><div class="news-card-img"></div><div class="news-card-body"><div class="sk-line"></div><div class="sk-line short"></div><div class="sk-line xshort"></div></div></div>

        <a href="about.html"><span style="font-size:1.2rem;">👥</span>关于</a>

        <div class="container">
            <div class="footer-grid">
                <div class="footer-col"><h4>📰 岳阳县二中学生记者社</h4><p>真实记录、客观传播、服务校园、锻炼自我</p><p style="margin-top:8px;">成立于2025年，岳阳县第二中学具有影响力的学生社团之一</p></div>

        </div>
    </footer>

    <button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">⬆</button>

    <script>
        var supabase = window.supabase.createClient(
            'https://dhwgxuvkwjqkwgetezun.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRod2d4dXZrd2pxa3dnZXRlenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTU4NDksImV4cCI6MjA5ODc3MTg0OX0.xbeSSfXk6_mdKN-9B1B0MByiFrXIntcNDlJS1XAnlrs'
        );

        var navbar = document.getElementById('navbar');
        var navToggle = document.getElementById('navToggle');
        var navMenu = document.getElementById('navMenu');
        var backTop = document.getElementById('backToTop');
        var allArticles = [];
        var animObserver = null;

        window.addEventListener('scroll', function(){
            if (window.scrollY > 60) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
            backTop.style.display = window.scrollY > 500 ? 'block' : 'none';
        });

        navToggle.addEventListener('click', function(){
            navToggle.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        var links = navMenu.querySelectorAll('.nav-link');
        for (var i = 0; i < links.length; i++) {
            links[i].addEventListener('click', function(){
                navMenu.classList.remove('active');
                navToggle.classList.remove('active');
            });
        }

        // 暗色模式
        document.getElementById('darkToggle').addEventListener('click', function(e){
            e.stopPropagation();
            toggleDark();
        });
        function toggleDark(){
            document.body.classList.toggle('dark');
            var isDark = document.body.classList.contains('dark');
            document.getElementById('darkToggle').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        if(localStorage.getItem('theme') === 'dark'){
            document.body.classList.add('dark');
            document.getElementById('darkToggle').textContent = '☀️';
        }

        // 加载全部文章
        supabase.from('articles')
            .select('id, title, excerpt, cover_image, category, author, created_at, pinned')
            .eq('published', true)
            .order('pinned', { ascending: false })
            .order('created_at', { ascending: false })
            .limit(100)
            .then(function(r){
                allArticles = r.data || [];
                renderNews(allArticles);
                var cats = {};
                for(var i = 0; i < allArticles.length; i++){
                    if(allArticles[i].category) cats[allArticles[i].category] = 1;
                }
                var filterEl = document.getElementById('newsFilter');
                for(var k in cats){
                    filterEl.innerHTML += '<option value="' + k + '">' + k + '</option>';
                }
            });

        function renderNews(data){
            var grid = document.getElementById('newsGrid');
            if(!data || data.length === 0){
                grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><h3>暂无文章</h3><p>还没有发布任何校园新闻</p></div>';
                return;
            }
            var html = '';
            for(var i = 0; i < data.length; i++){
                var a = data[i];
                html += '<article class="news-card" onclick="window.location.href=\'article.html?id=' + a.id + '\'" style="opacity:0;transform:translateY(20px);transition:opacity .5s ease, transform .5s ease;">';
                html += '<div class="news-card-img">' + (a.cover_image ? '<img src="' + a.cover_image + '" alt="' + a.title + '" loading="lazy">' : '<span style="font-size:3rem;">📰</span>') + '</div>';
                html += '<div class="news-card-body"><span class="news-card-tag">' + (a.category || '校园新闻') + '</span>';
                html += '<h3>' + (a.pinned ? '📌 ' : '') + a.title + '</h3>';
                html += '<p class="news-card-excerpt">' + (a.excerpt || '点击查看详情') + '</p>';
                html += '<div class="news-card-meta"><span>✍️ ' + (a.author || '记者社') + '</span><span>📅 ' + (a.created_at || '').substring(0, 10) + '</span></div>';
                html += '</div></article>';
            }
            grid.innerHTML = html;

            // 滚动渐入动画
            if(animObserver) animObserver.disconnect();
            animObserver = new IntersectionObserver(function(entries){
                entries.forEach(function(entry){
                    if(entry.isIntersecting){
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                        animObserver.unobserve(entry.target);
                    }
                });
            }, {threshold: 0.1});
            var cards = grid.querySelectorAll('.news-card');
            for(var j = 0; j < cards.length; j++){
                animObserver.observe(cards[j]);
            }
        }

        function filterNews(){
            var search = (document.getElementById('newsSearch').value || '').trim().toLowerCase();
            var filter = (document.getElementById('newsFilter').value || 'all');
            var data = allArticles.slice();
            if(filter !== 'all') data = data.filter(function(d){ return d.category === filter; });
            if(search) data = data.filter(function(d){ return (d.title || '').toLowerCase().indexOf(search) !== -1; });
            renderNews(data);
        }
    </script>
</body>
