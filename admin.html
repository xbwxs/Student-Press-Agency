<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理后台 - 岳阳县二中学生记者社</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        :root{
            --bg:#f0f4f8;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;
            --blue:#2563eb;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-tap-highlight-color:transparent;}
        a{color:inherit;text-decoration:none;}
        button{cursor:pointer;font-family:inherit;-webkit-appearance:none;user-select:none;}
        input,select,textarea{font-family:inherit;font-size:.9rem;}

        .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#0f172a,#1e3a5f,#1e4d8c);}
        .login-card{background:#fff;border-radius:20px;padding:48px 36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
        .login-card .logo{text-align:center;font-size:2.5rem;margin-bottom:8px;}
        .login-card h1{text-align:center;font-size:1.4rem;font-weight:700;color:#0f172a;margin-bottom:4px;}
        .login-card .sub{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:28px;}
        .field{margin-bottom:16px;}
        .field label{display:block;font-weight:600;font-size:.85rem;margin-bottom:5px;color:#334155;}
        .field input,.field textarea,.field select{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:.9rem;background:#f8fafc;resize:vertical;}
        .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 4px rgba(37,99,235,.1);}
        .btn-login{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;transition:.15s;}
        .btn-login:hover{background:#1d4ed8;transform:translateY(-1px);}
        .btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}

        .dashboard{display:none;min-height:100vh;}
        .dashboard.show{display:flex;}
        .sidebar{width:220px;background:#0f172a;color:#fff;padding:20px 0;display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:100;transition:transform .3s ease;}
        .sidebar .brand{padding:0 18px 18px;font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:12px;}
        .sidebar .brand img{width:28px;height:28px;border-radius:6px;object-fit:cover;}
        .sidebar nav a{display:flex;align-items:center;gap:8px;padding:10px 18px;color:rgba(255,255,255,.55);font-size:.85rem;font-weight:500;transition:.15s;margin:1px 10px;border-radius:8px;cursor:pointer;}
        .sidebar nav a:hover,.sidebar nav a.active{background:rgba(255,255,255,.1);color:#fff;}
        .sidebar .user-info{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto;font-size:.78rem;color:rgba(255,255,255,.45);}
        .sidebar .user-info strong{color:#fff;display:block;}
        .sidebar .nav-bottom{padding:0 18px 8px;}
        .sidebar .nav-bottom button{background:rgba(255,255,255,.08);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:.8rem;width:100%;transition:.15s;}
        .sidebar .nav-bottom button:hover{background:rgba(255,255,255,.18);}

        .main{flex:1;padding:24px 28px;overflow-y:auto;max-height:100vh;}
        .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
        .topbar h2{font-size:1.4rem;font-weight:700;}
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
        .stat-card{background:#fff;border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;}
        .stat-card .ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
        .stat-card .ic.blue{background:#eff6ff;color:#2563eb;}
        .stat-card .ic.green{background:#ecfdf5;color:#10b981;}
        .stat-card .ic.amber{background:#fffbeb;color:#f59e0b;}
        .stat-card .ic.purple{background:#f5f3ff;color:#7c3aed;}
        .stat-card .num{font-size:1.6rem;font-weight:800;line-height:1;}
        .stat-card .lbl{font-size:.75rem;color:var(--muted);}

        .panel{display:none;}
        .panel.show{display:block;}
        .card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;}
        .card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-weight:600;}
        .card-body{padding:18px;}
        .no-perm{text-align:center;padding:60px 20px;color:var(--muted);}
        .no-perm .icon{font-size:3rem;margin-bottom:12px;}
        .no-perm h3{font-size:1.1rem;color:var(--text);margin-bottom:6px;}
        .no-perm p{font-size:.85rem;}

        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
        table{width:100%;border-collapse:collapse;min-width:600px;}
        th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:.84rem;white-space:nowrap;}
        th{background:#f8fafc;font-weight:600;color:var(--muted);font-size:.75rem;letter-spacing:.5px;position:sticky;top:0;z-index:1;}
        tr:hover td{background:#fafbfc;}
        td.ellipsis{max-width:180px;overflow:hidden;text-overflow:ellipsis;}
        .badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:.7rem;font-weight:600;}
        .badge-green{background:#d1fae5;color:#065f46;}
        .badge-yellow{background:#fef3c7;color:#92400e;}
        .badge-red{background:#fee2e2;color:#991b1b;}
        .badge-gray{background:#f1f5f9;color:#475569;}
        .badge-blue{background:#dbeafe;color:#1e40af;}
        .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:.82rem;font-weight:600;border:none;transition:.15s;white-space:nowrap;}
        .btn-blue{background:var(--blue);color:#fff;}
        .btn-blue:hover{background:#1d4ed8;}
        .btn-outline{background:#fff;color:var(--text);border:1px solid var(--border);}
        .btn-outline:hover{background:#f8fafc;}
        .btn-warn{background:#f59e0b;color:#fff;}
        .btn-warn:hover{background:#d97706;}
        /* ✅ 在 .btn-warn:hover 后面补上 */
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#059669;}
.btn-danger{background:#fff;color:var(--red);border:1px solid #fecaca;}
.btn-danger:hover{background:#fef2f2;}
        .btn-xs{padding:4px 10px;font-size:.73rem;}
        .btn-sm{padding:6px 12px;font-size:.78rem;}

        .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
        .toolbar select,.toolbar input{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:.82rem;background:#fff;max-width:140px;}
        .btn-row{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap;}
        .g{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
        .mb{margin-bottom:14px;}

        .editor-wrap{background:#fff;border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:18px;display:none;}
        .editor-wrap.show{display:block;}
        .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
        .preview-box{border:1px solid var(--border);border-radius:8px;padding:14px;min-height:60px;font-size:.78rem;color:var(--muted);background:#fafbfc;word-break:break-word;overflow-wrap:break-word;}

        .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;flex-wrap:wrap;gap:12px;}
        .toggle-big{padding:10px 24px;border-radius:10px;font-size:.9rem;font-weight:700;border:none;color:#fff;min-width:120px;transition:.2s;}
        .toggle-big:hover{transform:translateY(-1px);}
        .settings-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;}
        .setting-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;text-align:center;}
        .setting-card label{display:block;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
        .setting-card input{width:80px;text-align:center;font-size:1.4rem;font-weight:800;color:#2563eb;border:2px solid var(--border);border-radius:8px;padding:8px;}
        .setting-card input:focus{outline:none;border-color:var(--blue);}

        .fin-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
        .fin-box{background:#fff;border-radius:var(--radius);padding:18px;text-align:center;box-shadow:var(--shadow);}
        .fin-box .amount{font-size:1.8rem;font-weight:800;}
        .fin-box .lbl{font-size:.75rem;color:var(--muted);}
        .fin-box.green .amount{color:#10b981;}
        .fin-box.red .amount{color:#ef4444;}
        .fin-box.blue .amount{color:#2563eb;}

        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;padding:20px;}
        .modal.show{display:flex;}
        .modal-inner{background:#fff;border-radius:16px;padding:24px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative;}
        .modal-inner h3{margin-bottom:16px;padding-right:30px;}
        .modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;color:#64748b;}
        .modal-close:hover{background:#e2e8f0;color:#1e293b;}
        .kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:.85rem;gap:12px;}
        .kv .k{color:var(--muted);flex-shrink:0;}
        .kv .v{font-weight:500;text-align:right;word-break:break-word;}

        .toast{position:fixed;top:20px;right:20px;z-index:9999;padding:12px 20px;border-radius:10px;color:#fff;font-weight:600;font-size:.85rem;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slideIn .3s;max-width:90vw;}
        .toast.ok{background:#10b981;}
        .toast.err{background:#ef4444;}
        @keyframes slideIn{from{opacity:0;transform:translateX(60px);}to{opacity:1;transform:translateX(0);}}

        .hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;width:38px;height:38px;border-radius:10px;background:#0f172a;border:none;color:#fff;font-size:1.2rem;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:.2s;}
        .hamburger:active{transform:scale(.93);}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;}
        .sidebar-overlay.show{display:block;}
        .hint{font-size:.73rem;color:var(--muted);margin-top:4px;}

        @media(max-width:768px){
            .dashboard.show{flex-direction:column;}
            body.dashboard-shown .hamburger{display:flex;}
            .sidebar{position:fixed;top:0;left:0;height:100vh;height:100dvh;width:260px;transform:translateX(-100%);z-index:150;box-shadow:4px 0 20px rgba(0,0,0,.35);padding-top:56px;overflow-y:auto;}
            .sidebar.open{transform:translateX(0);}
            .main{padding:14px 12px 16px;max-height:none;overflow-y:visible;}
            .topbar{margin-bottom:14px;}
            .topbar h2{font-size:1.15rem;}
            .topbar .btn-outline{font-size:.7rem;padding:5px 10px;}
            .stats-row,.fin-summary{grid-template-columns:repeat(2,1fr);gap:8px;}
            .settings-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
            .row2,.row3{grid-template-columns:1fr;}
            .stat-card{padding:12px 14px;gap:10px;}
            .stat-card .num{font-size:1.3rem;}
            .stat-card .ic{width:34px;height:34px;font-size:.95rem;}
            .card-header{padding:10px 14px;font-size:.85rem;}
            .card-body{padding:12px;}
            .editor-wrap{padding:14px;}
            .toolbar{gap:6px;}
            .toolbar select,.toolbar input{padding:6px 8px;font-size:.75rem;max-width:110px;}
            table{min-width:500px;}
            th,td{padding:7px 8px;font-size:.73rem;}
            .btn{padding:5px 10px;font-size:.73rem;}
            .btn-xs{padding:3px 7px;font-size:.68rem;}
            .btn-sm{padding:5px 9px;font-size:.72rem;}
            .toggle-row{padding:12px 14px;}
            .toggle-big{padding:8px 16px;font-size:.8rem;min-width:100px;}
            .fin-box .amount{font-size:1.3rem;}
            .setting-card input{width:60px;font-size:1.1rem;}
            .modal-inner{padding:18px;border-radius:12px;max-height:85vh;}
            .kv{font-size:.78rem;}
        }
        @media(max-width:480px){
            .stats-row,.fin-summary,.settings-grid{grid-template-columns:1fr;}
            .toolbar{flex-direction:column;align-items:stretch;}
            .toolbar select,.toolbar input{max-width:none;width:100%;}
            table{min-width:400px;}
            .btn-row{justify-content:stretch;}
            .btn-row .btn{flex:1;justify-content:center;}
        }
    </style>
</head>
<body>

    <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="菜单">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <div class="login-wrap" id="loginPage">
        <div class="login-card">
            <div class="logo">📰</div>
            <h1>管理后台</h1>
            <p class="sub">岳阳县二中学生记者社</p>
            <div class="field"><label>管理员邮箱</label><input type="email" id="loginEmail" placeholder="admin@example.com" autocomplete="email"></div>
            <div class="field"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
            <button class="btn-login" type="button" onclick="doLogin()">登 录</button>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="brand"><img src="https://s41.ax1x.com/2026/07/05/pm0HYZV.png" alt="">记者社后台</div>
            <nav>
                <a class="active" data-tab="articles" onclick="switchTab('articles')">📰 文章管理</a>
                <a data-tab="recruitment" onclick="switchTab('recruitment')">📝 报名审核</a>
                <a data-tab="finance" onclick="switchTab('finance')">💰 财务管理</a>
                <a data-tab="logs" onclick="switchTab('logs')">📋 操作日志</a>
                <a data-tab="settings" onclick="switchTab('settings')">⚙️ 网站设置</a>
                <a data-tab="members" onclick="switchTab('members')">👥 成员管理</a>
                <a data-tab="opinion" onclick="switchTab('opinion')">📬 意见箱</a>
                <a data-tab="wall" onclick="switchTab('wall')">👥 社员墙</a>
                <a data-tab="checkin" onclick="switchTab('checkin')">✅ 签到</a>
            </nav>
            <div class="user-info">
                <strong id="userName">-</strong>
                <span id="userRoleTag">-</span>
            </div>
            <div class="nav-bottom"><button onclick="doLogout()">🚪 退出登录</button></div>
        </aside>

        <main class="main">
            <div class="topbar">
                <h2 id="pageTitle">📰 文章管理</h2>
                <a href="index.html" target="_blank" class="btn btn-outline btn-sm">🏠 查看首页</a>
            </div>

            <div class="stats-row">
                <div class="stat-card"><div class="ic blue">📰</div><div><div class="num" id="sArticles">-</div><div class="lbl">文章总数</div></div></div>
                <div class="stat-card"><div class="ic green">📝</div><div><div class="num" id="sTotal">-</div><div class="lbl">报名总数</div></div></div>
                <div class="stat-card"><div class="ic amber">⏳</div><div><div class="num" id="sPending">-</div><div class="lbl">待审核报名</div></div></div>
                <div class="stat-card"><div class="ic purple">💰</div><div><div class="num" id="sBalance">-</div><div class="lbl">财务余额</div></div></div>
            </div>

            <div class="panel show" id="panel-articles"><div id="perm-articles"></div></div>
            <div class="panel" id="panel-recruitment"><div id="perm-recruitment"></div></div>
            <div class="panel" id="panel-finance"><div id="perm-finance"></div></div>
            <div class="panel" id="panel-logs"><div id="perm-logs"></div></div>
            <div class="panel" id="panel-settings"><div id="perm-settings"></div></div>
            <div class="panel" id="panel-opinion"><div id="perm-opinion"></div></div>
<div class="panel" id="panel-wall"><div id="perm-wall"></div></div>
<div class="panel" id="panel-checkin"><div id="perm-checkin"></div></div>
            <div class="panel" id="panel-members"><div id="perm-members"></div></div>
        </main>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-inner">
            <button class="modal-close" onclick="closeDetail()" aria-label="关闭">✕</button>
            <h3>📋 报名详情</h3>
            <div id="detailContent"></div>
            <div class="btn-row" id="detailActions"></div>
        </div>
    </div>

    <script>
     var getLocalDate = function(){ var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); };
     function toBJ(iso){ if(!iso)return'';var d=new Date(iso);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function toBJTime(iso){ if(!iso)return'';var d=new Date(iso);return toBJ(iso)+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
        var supabase = window.supabase.createClient(
            'https://dhwgxuvkwjqkwgetezun.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRod2d4dXZrd2pxa3dnZXRlenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTU4NDksImV4cCI6MjA5ODc3MTg0OX0.xbeSSfXk6_mdKN-9B1B0MByiFrXIntcNDlJS1XAnlrs'
        );
        var currentUser = null;
        var currentDetailId = null;
        var allRecData = [];
        var loadingTab = false;

        var roleNames = {
            super_admin:'👑 超级管理员',president:'👔 社长',admin_secretary:'📋 行政秘书',
            vice_president:'🏠 副社长',author:'📝 采访部',photographer:'📸 摄影部',
            video_editor:'🎬 剪辑部',recruitment_admin:'📢 策划部',logistics_admin:'🔧 后勤部',
            finance_admin:'💰 财务部',viewer:'👁️ 普通社员'
        };

        function hasRole(){return currentUser&&Array.prototype.indexOf.call(arguments,currentUser.role)!==-1;}
        function escHtml(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
        function escAttr(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

        function toggleSidebar(){
            var s=document.getElementById('sidebar'),o=document.getElementById('sidebarOverlay');
            if(s.classList.contains('open')){closeSidebar();}
            else{s.classList.add('open');o.classList.add('show');document.body.style.overflow='hidden';}
        }
        function closeSidebar(){
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');document.body.style.overflow='';
        }

        supabase.auth.getSession().then(function(r){if(r.data&&r.data.session)loadProfile(r.data.session.user.id);});

        function loadProfile(uid){
            supabase.from('profiles').select('*').eq('id',uid).single().then(function(r){
                if(r.error||!r.data){currentUser={id:uid,role:'viewer',display_name:'',department:''};}
                else{currentUser=r.data;}showDashboard();
            });
        }

        function showDashboard(){
            document.getElementById('loginPage').style.display='none';
            document.getElementById('dashboard').classList.add('show');document.body.classList.add('dashboard-shown');
            document.getElementById('userName').textContent=currentUser.display_name||currentUser.department||'用户';
            document.getElementById('userRoleTag').textContent=roleNames[currentUser.role]||currentUser.role;
            loadStats();switchTab('articles');
            checkCheckinReminder();
}

function checkCheckinReminder(){
    var today=getLocalDate();
    supabase.from('checkins').select('id').eq('user_id',currentUser.id).eq('check_date',today).single().then(function(r){
        if(!r.data){toast('📅 今天还没签到哦，快去签到吧！','err');}
    });
}

        function switchTab(t){
            if(loadingTab)return;loadingTab=true;closeSidebar();
            document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('show');});
            var panel=document.getElementById('panel-'+t);if(panel)panel.classList.add('show');
            document.querySelectorAll('.sidebar nav a').forEach(function(a){a.classList.remove('active');});
            var link=document.querySelector('.sidebar nav a[data-tab="'+t+'"]');if(link)link.classList.add('active');

});

            }]).then(function(){});

            html+='<button class="btn btn-outline" onclick="closeEditor()">取消</button></div></div>';

            html+='<div class="table-wrap"><table><thead><tr><th>置顶</th><th>标题</th><th>分类</th><th>作者</th><th>日期</th><th>状态</th><th>操作</th></tr></thead><tbody id="articlesTbody"><tr><td colspan="7" style="text-align:center;padding:32px;color:#888;">加载中...</td></tr></tbody></table></div>';
            html+='</div>';

            document.getElementById('aContent').addEventListener('input',function(){document.getElementById('previewBox').innerHTML=this.value||'<span style="color:#94a3b8;">预览</span>';});
            loadArticleList();
        }

        function loadArticleList(){
            var q=supabase.from('articles').select('*').order('pinned',{ascending:false}).order('created_at',{ascending:false});
            q.then(function(r){
                var tb=document.getElementById('articlesTbody');if(!tb)return;
                var data=r.data||[];
                var searchEl=document.getElementById('aSearch');
                var filterEl=document.getElementById('aFilter');
                var search=(searchEl&&searchEl.value||'').trim().toLowerCase();
                var filter=filterEl&&filterEl.value||'all';
                if(search)data=data.filter(function(d){return(d.title||'').toLowerCase().indexOf(search)!==-1;});
                if(filter==='published')data=data.filter(function(d){return d.published;});
                if(filter==='draft')data=data.filter(function(d){return!d.published;});

                if(!data||data.length===0){tb.innerHTML='<tr><td colspan="7" style="text-align:center;padding:32px;color:#888;">暂无文章</td></tr>';return;}
                var h='';
                for(var i=0;i<data.length;i++){
                    var a=data[i];
                    var canEdit=hasRole('super_admin','president','admin_secretary','vice_president')||(a.author_id===currentUser.id);
                    var canDel=hasRole('super_admin','president','admin_secretary','vice_president');
                    var canPin=hasRole('super_admin','president','admin_secretary','vice_president');
                    h+='<tr>';
                    h+='<td>';
                    if(canPin){h+='<button class="btn btn-xs '+(a.pinned?'btn-warn':'btn-outline')+'" onclick="togglePin(\''+a.id+'\','+(a.pinned?'false':'true')+')" title="'+(a.pinned?'取消置顶':'置顶')+'">'+(a.pinned?'📌':'📍')+'</button>';}
                    else if(a.pinned){h+='<span style="font-size:.8rem;">📌</span>';}
                    h+='</td>';
                    h+='<td class="ellipsis" title="'+escAttr(a.title)+'">'+escHtml(a.title)+'</td>';
                    h+='<td>'+escHtml(a.category||'')+'</td>';
                    h+='<td>'+escHtml(a.author||'')+'</td>';
                    h+='<td>'+(a.created_at||'').substring(0,10)+'</td>';
                    h+='<td><span class="badge '+(a.published?'badge-green':'badge-gray')+'">'+(a.published?'已发布':'草稿')+'</span></td>';
                    h+='<td style="white-space:nowrap;">';
                    if(canEdit)h+='<button class="btn btn-outline btn-xs" onclick="editArticle(\''+a.id+'\')">编辑</button> ';
                    if(canDel)h+='<button class="btn btn-danger btn-xs" onclick="deleteArticle(\''+a.id+'\')">删除</button>';
                    h+='</td></tr>';
                }
                tb.innerHTML=h;
            });
        }

        function togglePin(id,pin){
            supabase.from('articles').update({pinned:pin}).eq('id',id).then(function(r){
                if(r.error){toast('操作失败: '+r.error.message,'err');return;}
                writeLog(pin?'置顶文章':'取消置顶','article',id,'');loadArticleList();toast(pin?'已置顶':'已取消置顶','ok');
            });
        }

        function openEditor(){
            document.getElementById('editId').value='';document.getElementById('editorTitle').textContent='写文章';
            document.getElementById('aTitle').value='';document.getElementById('aCategory').value='';
            document.getElementById('aAuthor').value='';document.getElementById('aCover').value='';
            document.getElementById('aExcerpt').value='';document.getElementById('aContent').value='';
            document.getElementById('previewBox').innerHTML='<span style="color:#94a3b8;">预览</span>';
            document.getElementById('editor').classList.add('show');
            document.getElementById('editor').scrollIntoView({behavior:'smooth',block:'start'});
        }
        function closeEditor(){document.getElementById('editor').classList.remove('show');}

        function editArticle(id){
            supabase.from('articles').select('*').eq('id',id).single().then(function(r){
                if(r.error){toast('加载文章失败','err');return;}
                var a=r.data;
                document.getElementById('editId').value=a.id;document.getElementById('editorTitle').textContent='编辑文章';
                document.getElementById('aTitle').value=a.title||'';document.getElementById('aCategory').value=a.category||'';
                document.getElementById('aAuthor').value=a.author||'';document.getElementById('aCover').value=a.cover_image||'';
                document.getElementById('aExcerpt').value=a.excerpt||'';document.getElementById('aContent').value=a.content||'';
                document.getElementById('previewBox').innerHTML=a.content||'<span style="color:#94a3b8;">预览</span>';
                document.getElementById('editor').classList.add('show');
                document.getElementById('editor').scrollIntoView({behavior:'smooth',block:'start'});
            });
        }

        function saveArticle(pub){
            if(pub&&!hasRole('super_admin','president','admin_secretary','vice_president')){toast('你没有发布权限，只能保存草稿','err');return;}
            var id=document.getElementById('editId').value;
            var data={
                title:document.getElementById('aTitle').value.trim(),
                category:document.getElementById('aCategory').value.trim(),
                author:document.getElementById('aAuthor').value.trim(),
                cover_image:document.getElementById('aCover').value.trim(),
                excerpt:document.getElementById('aExcerpt').value.trim(),
                content:document.getElementById('aContent').value.trim(),
                published:pub,
                updated_at:new Date().toISOString()
            };
            if(!data.title){toast('标题不能为空','err');return;}
            var p;
            if(id){p=supabase.from('articles').update(data).eq('id',id);}
            else{data.author_id=currentUser.id;data.department=currentUser.department;data.created_at=new Date().toISOString();p=supabase.from('articles').insert([data]);}
            p.then(function(r){
                if(r.error){toast('保存失败: '+r.error.message,'err');return;}
                closeEditor();loadStats();
                var title=data.title||'无标题',targetId=id||(r.data&&r.data[0]?r.data[0].id:'');
                writeLog(pub?'发布文章':'保存草稿','article',targetId,title);loadArticleList();
                toast(pub?'发布成功':'草稿已保存','ok');
            });
        }

        function deleteArticle(id){
            if(!confirm('确定删除这篇文章？此操作不可恢复。'))return;
            supabase.from('articles').delete().eq('id',id).then(function(r){
                if(r.error){toast('删除失败: '+r.error.message,'err');return;}
                writeLog('删除文章','article',id,'');loadArticleList();loadStats();toast('已删除','ok');
            });
        }

        // ==========================================
        // 2. 报名审核
        // ==========================================
        function buildRecruitment(container){
            if(!hasRole('super_admin','president','admin_secretary','vice_president')){
                noPerm(container,'只有社长、行政秘书、副社长可以审核报名。');return;
            }
            var html='<div class="card"><div class="card-header"><span>招新报名记录</span>';
            html+='<div class="toolbar" style="margin-bottom:0;">';
            html+='<select id="fDept" onchange="loadRecList()"><option value="">全部部门</option><option>采访部</option><option>摄影部</option><option>剪辑部</option><option>策划部</option><option>后勤部</option><option>财务部</option></select>';
            html+='<select id="fStatus" onchange="loadRecList()"><option value="">全部状态</option><option value="pending">待审核</option><option value="accepted">已通过</option><option value="rejected">未通过</option></select>';
            html+='<input type="text" id="fSearch" placeholder="搜索姓名/班级" oninput="loadRecList()">';
            html+='</div></div>';
            html+='<div style="padding:8px 18px;display:flex;gap:8px;flex-wrap:wrap;">';
            html+='<button class="btn btn-green btn-sm" onclick="batchAccept()">✅ 批量通过</button>';
            html+='<button class="btn btn-danger btn-sm" onclick="batchDeleteRec()">🗑️ 批量删除</button>';
            html+='<button class="btn btn-warn btn-sm" onclick="clearRejected()">🧹 清除所有已拒绝</button>';
            html+='<button class="btn btn-outline btn-sm" onclick="exportCSV()">📥 导出CSV</button>';
            html+='</div>';
            html+='<div class="table-wrap"><table><thead><tr><th style="width:30px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th><th>姓名</th><th>班级</th><th>手机</th><th>部门</th><th>日期</th><th>状态</th><th>操作</th></tr></thead><tbody id="recruitmentTbody"><tr><td colspan="8" style="text-align:center;padding:32px;">加载中...</td></tr></tbody></table></div>';
            html+='<div style="padding:10px 18px;color:var(--muted);font-size:.8rem;" id="recCount"></div>';
            html+='</div>';
            container.innerHTML=html;loadRecList();
        }

        function loadRecList(){
            var deptEl=document.getElementById('fDept'),statusEl=document.getElementById('fStatus'),searchEl=document.getElementById('fSearch');
            if(!deptEl||!statusEl||!searchEl)return;
            var dept=deptEl.value,status=statusEl.value,search=searchEl.value.trim().toLowerCase();
            var q=supabase.from('recruitment').select('*').order('created_at',{ascending:false});
            if(dept)q=q.eq('department',dept);if(status)q=q.eq('status',status);
            q.then(function(r){
                var data=r.data||[];
                if(search){data=data.filter(function(d){return(d.name||'').toLowerCase().indexOf(search)!==-1||(d.class_name||'').toLowerCase().indexOf(search)!==-1;});}
                allRecData=data;
                var countEl=document.getElementById('recCount');if(countEl)countEl.textContent='共 '+data.length+' 条';
                var tb=document.getElementById('recruitmentTbody');if(!tb)return;
                var map={pending:'待审核',accepted:'已通过',rejected:'未通过'};
                if(data.length===0){tb.innerHTML='<tr><td colspan="8" style="text-align:center;padding:32px;">暂无报名记录</td></tr>';return;}
                var h='';
                for(var i=0;i<data.length;i++){
                    var a=data[i];
                    var bc=a.status==='pending'?'badge-yellow':(a.status==='accepted'?'badge-green':'badge-red');
                    h+='<tr>';
                    h+='<td><input type="checkbox" class="rec-check" value="'+a.id+'"></td>';
                    h+='<td><a href="javascript:void(0)" style="color:#2563eb;font-weight:600;" onclick="openDetail(\''+a.id+'\')">'+escHtml(a.name)+'</a></td>';
                    h+='<td>'+escHtml(a.class_name||'')+'</td>';
                    h+='<td>'+escHtml(a.phone||'')+'</td>';
                    h+='<td>'+escHtml(a.department||'')+'</td>';
                    h+='<td>'+toBJ(a.created_at) +'</td>';
                    h+='<td><span class="badge '+bc+'">'+(map[a.status]||a.status)+'</span></td>';
                    h+='<td style="white-space:nowrap;">';
                    h+='<button class="btn btn-outline btn-xs" onclick="updateRec(\''+a.id+'\',\'accepted\')">通过</button> ';
                    h+='<button class="btn btn-outline btn-xs" onclick="updateRec(\''+a.id+'\',\'rejected\')">拒绝</button> ';
                    h+='<button class="btn btn-danger btn-xs" onclick="deleteSingleRec(\''+a.id+'\',\''+escAttr(a.name||'未知')+'\')">🗑</button>';
                    h+='</td></tr>';
                }
                tb.innerHTML=h;
            });
        }

        function toggleSelectAll(){
            var all=document.getElementById('selectAll');if(!all)return;
            var checked=all.checked;document.querySelectorAll('.rec-check').forEach(function(c){c.checked=checked;});
        }

        function batchAccept(){
            var ids=[];document.querySelectorAll('.rec-check:checked').forEach(function(c){ids.push(c.value);});
            if(ids.length===0){toast('请先勾选要操作的记录','err');return;}
            if(!confirm('确定批量通过 '+ids.length+' 条报名记录？'))return;
            var promises=[];for(var i=0;i<ids.length;i++){promises.push(supabase.from('recruitment').update({status:'accepted'}).eq('id',ids[i]));}
            Promise.all(promises).then(function(results){
                var failed=0;for(var j=0;j<results.length;j++){if(results[j].error)failed++;}
                loadRecList();loadStats();writeLog('批量通过报名','recruitment','',ids.length+'条');
                if(failed>0){toast('通过 '+(ids.length-failed)+' 条，'+failed+' 条失败','err');}
                else{toast('已通过 '+ids.length+' 条','ok');}
            });
        }

        function batchDeleteRec(){
            var ids=[];document.querySelectorAll('.rec-check:checked').forEach(function(c){ids.push(c.value);});
            if(ids.length===0){toast('请先勾选要删除的记录','err');return;}
            if(!confirm('⚠️ 确定永久删除 '+ids.length+' 条报名记录？此操作不可恢复！'))return;
            var promises=[];for(var i=0;i<ids.length;i++){promises.push(supabase.from('recruitment').delete().eq('id',ids[i]));}
            Promise.all(promises).then(function(results){
                var failed=0;for(var j=0;j<results.length;j++){if(results[j].error)failed++;}
                loadRecList();loadStats();writeLog('批量删除报名','recruitment','',ids.length+'条');
                if(failed>0){toast('删除 '+(ids.length-failed)+' 条，'+failed+' 条失败','err');}
                else{toast('已删除 '+ids.length+' 条','ok');}
            });
        }

        function deleteSingleRec(id,name){
            if(!confirm('⚠️ 确定永久删除 '+name+' 的报名记录？此操作不可恢复！'))return;
            supabase.from('recruitment').delete().eq('id',id).then(function(r){
                if(r.error){toast('删除失败: '+r.error.message,'err');return;}
                loadRecList();loadStats();writeLog('删除报名','recruitment',id,name);toast('已删除','ok');
            });
        }

        function clearRejected(){
            if(!confirm('⚠️ 确定删除所有"已拒绝"的报名记录？此操作不可恢复！'))return;
            supabase.from('recruitment').delete().eq('status','rejected').then(function(r){
                if(r.error){toast('清除失败: '+r.error.message,'err');return;}
                loadRecList();loadStats();writeLog('清除已拒绝报名','recruitment','','');toast('已清除所有已拒绝记录','ok');
            });
        }

        function updateRec(id,status){
            supabase.from('recruitment').update({status:status}).eq('id',id).then(function(r){
                if(r.error){toast('更新失败: '+r.error.message,'err');return;}
                loadRecList();loadStats();writeLog(status==='accepted'?'通过报名':'拒绝报名','recruitment',id,'');toast('已更新','ok');
            });
        }

        function openDetail(id){
            var d=null;for(var i=0;i<allRecData.length;i++){if(allRecData[i].id===id){d=allRecData[i];break;}}
            if(!d){supabase.from('recruitment').select('*').eq('id',id).single().then(function(r){if(r.error||!r.data){toast('加载详情失败','err');return;}renderDetail(r.data);});return;}
            renderDetail(d);
        }
        function renderDetail(d){
            currentDetailId=d.id;
            var map={pending:'⏳ 待审核',accepted:'✅ 已通过',rejected:'❌ 未通过'};
            var h='';
            h+='<div class="kv"><span class="k">姓名</span><span class="v">'+escHtml(d.name)+'</span></div>';
            h+='<div class="kv"><span class="k">班级</span><span class="v">'+escHtml(d.class_name||'')+'</span></div>';
            h+='<div class="kv"><span class="k">手机</span><span class="v">'+escHtml(d.phone||'')+'</span></div>';
            if(d.email)h+='<div class="kv"><span class="k">邮箱</span><span class="v">'+escHtml(d.email)+'</span></div>';
            h+='<div class="kv"><span class="k">部门</span><span class="v">'+escHtml(d.department||'')+'</span></div>';
            if(d.skills)h+='<div class="kv"><span class="k">特长</span><span class="v">'+escHtml(d.skills)+'</span></div>';

            h+='<div class="kv"><span class="k">状态</span><span class="v">'+(map[d.status]||d.status)+'</span></div>';
            document.getElementById('detailContent').innerHTML=h;
            document.getElementById('detailActions').innerHTML=
                '<button class="btn btn-outline btn-sm" onclick="detailRec(\'pending\')">↩️ 重置待定</button>'+
                '<button class="btn btn-danger btn-sm" onclick="detailDelete()">🗑️ 删除</button>'+
                '<button class="btn btn-outline btn-sm" onclick="detailRec(\'rejected\')">❌ 拒绝</button>'+
                '<button class="btn btn-green btn-sm" onclick="detailRec(\'accepted\')">✅ 通过</button>';
            document.getElementById('detailModal').classList.add('show');document.body.style.overflow='hidden';
        }
        function closeDetail(){document.getElementById('detailModal').classList.remove('show');document.body.style.overflow='';currentDetailId=null;}
        document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)closeDetail();});
        document.addEventListener('keydown',function(e){if(e.key==='Escape'){if(document.getElementById('detailModal').classList.contains('show'))closeDetail();if(document.getElementById('sidebarOverlay').classList.contains('show'))closeSidebar();}});
        function detailRec(status){
            if(!currentDetailId)return;
            supabase.from('recruitment').update({status:status}).eq('id',currentDetailId).then(function(r){
                if(r.error){toast('更新失败','err');return;}
                closeDetail();loadRecList();loadStats();writeLog('更新报名状态','recruitment',currentDetailId,status);toast('已更新','ok');
            });

// ✨ 打开/关闭批量导入
function openBatchForm(){document.getElementById('batchForm').style.display='block';document.getElementById('memberForm').style.display='none';document.getElementById('batchForm').scrollIntoView({behavior:'smooth',block:'start'});}
function closeBatchForm(){document.getElementById('batchForm').style.display='none';}

// ✨ 批量导入函数
var batchRunning = false;
function batchImport(){
    if(batchRunning){toast('正在导入中，请稍候...','err');return;}
    var raw = document.getElementById('batchInput').value.trim();
    if(!raw){toast('请粘贴成员名单','err');return;}
    var lines = raw.split('\n').filter(function(l){return l.trim();});
    if(lines.length === 0){toast('没有有效行','err');return;}
    if(!confirm('确定导入 '+lines.length+' 名成员？\n\n每个间隔 1.5 秒，预计 '+(lines.length*1.5).toFixed(0)+' 秒完成。')) return;

    batchRunning = true;
    var total = lines.length;
    var done = 0;
    var failed = 0;
    var progressEl = document.getElementById('batchProgress');
    var btn = document.querySelector('#batchForm .btn-green');
    if(btn){btn.disabled = true;btn.textContent = '导入中...';}

    function processNext(index){
        if(index >= lines.length){
            batchRunning = false;
            if(btn){btn.disabled = false;btn.textContent = '🚀 开始导入';}
            progressEl.textContent = '✅ 完成！成功 ' + done + ' 人，失败 ' + failed + ' 人';
            loadMembers();
            toast('导入完成：成功 '+done+' / 失败 '+failed,'ok');
            return;
        }
        var parts = lines[index].split(',');
        if(parts.length < 3){
            failed++;
            progressEl.textContent = '⏳ ' + (index+1) + '/' + total + ' | ❌ 第'+(index+1)+'行格式错误';
            setTimeout(function(){processNext(index+1);}, 200);
            return;
        }
        var email = parts[0].trim();
        var password = parts[1].trim();
        var name = parts[2].trim();
        var dept = (parts[3]||'').trim();
        var role = (parts[4]||'').trim();
progressEl.textContent = '⏳ ' + (index+1) + '/' + total + ' | 正在创建 ' + name + '...';
supabase.auth.signUp({email:email, password:password}).then(function(r) {
    if (r.error) {
        failed++;
        progressEl.textContent = '⏳ ' + (index+1) + '/' + total + ' | ❌ ' + name + ': ' + r.error.message;
                setTimeout(function(){processNext(index+1);}, 300);
            } else {
                var uid = r.data.user ? r.data.user.id : null;
                if(uid){
                    supabase.from('profiles').upsert({id:uid, display_name:name, department:dept, role:role}).then(function(){
                        done++;
                        progressEl.textContent = '⏳ ' + (index+1) + '/' + total + ' | ✅ ' + name + ' 完成';
                        setTimeout(function(){processNext(index+1);}, 1500);
                    });
                } else {
                    done++;
                    progressEl.textContent = '⏳ ' + (index+1) + '/' + total + ' | ✅ ' + name + '（需邮件确认）';
                    setTimeout(function(){processNext(index+1);}, 1500);
                }
            }
        });
    }
    processNext(0);
}

        function editMemberInfo(uid, currentName, currentDept, currentClass, currentQq, currentPhone){
    var newName = prompt('修改显示名称（留空不变）：', currentName || '');
    if(newName === null) return;
    newName = newName.trim();
    var newDept = prompt('修改部门（留空不变）：', currentDept || '');
    if(newDept === null) return;
    newDept = newDept.trim();
    var newClass = prompt('修改班级（留空不变）：', currentClass || '');
    if(newClass === null) return;
    newClass = newClass.trim();
    var newQq = prompt('修改QQ（留空不变）：', currentQq || '');
    if(newQq === null) return;
    newQq = newQq.trim();
    var newPhone = prompt('修改电话（留空不变）：', currentPhone || '');
    if(newPhone === null) return;
    newPhone = newPhone.trim();

    var updateData = {};
    if(newName !== (currentName || '')) updateData.display_name = newName;
    if(newDept !== (currentDept || '')) updateData.department = newDept;
    if(newClass !== (currentClass || '')) updateData.class_name = newClass;
    if(newQq !== (currentQq || '')) updateData.qq = newQq;
    if(newPhone !== (currentPhone || '')) updateData.phone = newPhone;

    if(Object.keys(updateData).length === 0){toast('未做任何修改','err');return;}

    supabase.from('profiles').update(updateData).eq('id', uid).then(function(r){
        if(r.error){toast('修改失败: '+r.error.message,'err');return;}
        toast('信息已更新 ✅','ok');
        writeLog('编辑成员信息','profile',uid,JSON.stringify(updateData));
        if(uid === currentUser.id){
            if(updateData.display_name) currentUser.display_name = updateData.display_name;
            if(updateData.department) currentUser.department = updateData.department;
            document.getElementById('userName').textContent = currentUser.display_name || currentUser.department || '用户';
        }
        loadMembers();
    });
}

function buildOpinion(container){
    var html='<div class="card"><div class="card-header"><span>📬 意见箱</span>';
    html+='<button class="btn btn-blue btn-sm" onclick="openOpinionForm()">✍️ 提交意见</button></div>';

    html+='<div class="card-body" id="opinionForm" style="display:none;border-bottom:1px solid var(--border);">';
    html+='<h4 style="margin-bottom:12px;">提交意见或建议</h4>';
    html+='<div class="row2 mb"><div class="field"><label>分类</label><select id="oCategory"><option value="建议">💡 建议</option><option value="吐槽">😤 吐槽</option><option value="表扬">🌟 表扬</option><option value="想法">💭 想法</option><option value="其他">📌 其他</option></select></div></div>';
    html+='<div class="field"><label>内容</label><textarea id="oContent" rows="4" placeholder="你的想法..."></textarea></div>';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">';
    html+='<input type="checkbox" id="oAnonymous"><label for="oAnonymous" style="font-size:.85rem;">匿名提交</label></div>';
    html+='<div class="g"><button class="btn btn-green btn-sm" onclick="submitOpinion()">💾 提交</button>';
    html+='<button class="btn btn-outline btn-sm" onclick="closeOpinionForm()">取消</button></div></div>';

    html+='<div style="padding:8px 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">';
    html+='<select id="oFilter" onchange="loadOpinionList()" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:.8rem;">';
    html+='<option value="全部">全部</option><option value="建议">💡 建议</option><option value="吐槽">😤 吐槽</option><option value="表扬">🌟 表扬</option><option value="想法">💭 想法</option><option value="其他">📌 其他</option></select>';
    html+='<input type="text" id="oSearch" placeholder="🔍 搜索..." oninput="loadOpinionList()" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:.8rem;max-width:160px;flex:1;"></div>';

    html+='<div style="padding:12px 18px;" id="opinionList">加载中...</div>';
    html+='</div>';
    container.innerHTML=html;
    loadOpinionList();
}

function openOpinionForm(){document.getElementById('opinionForm').style.display='block';}
function closeOpinionForm(){
    document.getElementById('opinionForm').style.display='none';
    document.getElementById('oContent').value='';
}

function submitOpinion(){
    var content=document.getElementById('oContent').value.trim();
    var category=document.getElementById('oCategory').value;
    var anonymous=document.getElementById('oAnonymous').checked;
    if(!content){toast('请输入内容','err');return;}
    supabase.from('suggestions').insert([{
        content:content, category:category, is_anonymous:anonymous,
        user_id:currentUser.id, user_name:anonymous?'匿名':(currentUser.display_name||'用户'),
        status:'unread', likes:0, pinned:false
    }]).then(function(r){
        if(r.error){toast('提交失败: '+r.error.message,'err');return;}
        closeOpinionForm();
        loadOpinionList();
        writeLog('提交意见','suggestion','',category);
        toast('意见已提交 ✅','ok');
    });
}

function loadOpinionList(){
    var filter=(document.getElementById('oFilter')||{}).value||'全部';
    var search=((document.getElementById('oSearch')||{}).value||'').trim().toLowerCase();
    supabase.from('suggestions').select('*').order('pinned',{ascending:false}).order('created_at',{ascending:false}).limit(100).then(function(r){
        var el=document.getElementById('opinionList');
        if(!el)return;
        var data=r.data||[];
        if(filter!=='全部') data=data.filter(function(d){return d.category===filter;});
        if(search) data=data.filter(function(d){return (d.content||'').toLowerCase().indexOf(search)!==-1 || (d.user_name||'').toLowerCase().indexOf(search)!==-1;});
        if(data.length===0){el.innerHTML='<div style="text-align:center;padding:32px;color:#888;">暂无意见，欢迎第一个发言 💬</div>';return;}
        var catColor={建议:'#dbeafe',吐槽:'#fee2e2',表扬:'#d1fae5',想法:'#fef3c7',其他:'#f1f5f9'};
        var catEmoji={建议:'💡',吐槽:'😤',表扬:'🌟',想法:'💭',其他:'📌'};
        var statusLabel={unread:'未读',read:'已读',replied:'已回复'};
        var statusColor={unread:'#f59e0b',read:'#94a3b8',replied:'#10b981'};
        var h='';
        for(var i=0;i<data.length;i++){
            var s=data[i];
            var isOwner=s.user_id===currentUser.id;
            var isAdmin=hasRole('super_admin','president');
            h+='<div style="background:#fff;border-radius:8px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.04);'+(s.pinned?'border-left:3px solid #f59e0b;':'')+'">';
            h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
            h+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">';
            if(s.pinned)h+='<span style="font-size:.7rem;">📌</span>';
            h+='<span style="font-size:.75rem;font-weight:600;color:#2563eb;">'+escHtml(s.user_name)+'</span>';
            h+='<span style="background:'+(catColor[s.category]||'#f1f5f9')+';border-radius:12px;padding:1px 8px;font-size:.68rem;">'+(catEmoji[s.category]||'')+' '+escHtml(s.category||'其他')+'</span>';
            h+='<span style="font-size:.65rem;color:'+(statusColor[s.status]||'#94a3b8')+';">● '+(statusLabel[s.status]||s.status)+'</span>';
            h+='</div>';
            h+='<span style="font-size:.7rem;color:var(--muted);">'+toBJTime(s.created_at) +'</span>';
            h+='</div>';
            h+='<div style="font-size:.85rem;line-height:1.5;margin-bottom:6px;">'+escHtml(s.content)+'</div>';
            if(s.reply)h+='<div style="margin-bottom:6px;padding:8px 10px;background:#f0fdf4;border-radius:6px;font-size:.8rem;"><span style="font-weight:600;color:#059669;">📢 回复：</span>'+escHtml(s.reply)+'</div>';
            h+='<div style="display:flex;align-items:center;gap:12px;font-size:.73rem;color:var(--muted);">';
            h+='<span onclick="likeOpinion(\''+s.id+'\','+(s.likes||0)+')" style="cursor:pointer;user-select:none;">👍 '+(s.likes||0)+'</span>';
            if(isAdmin){
                h+='<span onclick="replyOpinion(\''+s.id+'\')" style="cursor:pointer;color:#2563eb;">💬 回复</span>';
                h+='<span onclick="togglePinOpinion(\''+s.id+'\','+(s.pinned?'false':'true')+')" style="cursor:pointer;">'+(s.pinned?'📌取消置顶':'📍置顶')+'</span>';
            }
            if(isOwner || isAdmin){
                h+='<span onclick="deleteOpinion(\''+s.id+'\')" style="cursor:pointer;color:#ef4444;">🗑 删除</span>';
            }
            h+='</div></div>';
        }
        el.innerHTML=h;
    });
}

function likeOpinion(id, currentLikes){
    supabase.from('suggestions').update({likes:(currentLikes||0)+1}).eq('id',id).then(function(r){
        if(r.error){toast('点赞失败','err');return;}
        loadOpinionList();
    });
}

function replyOpinion(id){
    var reply=prompt('请输入回复内容：','');
    if(reply===null||!reply.trim())return;
    supabase.from('suggestions').update({reply:reply.trim(),status:'replied'}).eq('id',id).then(function(r){
        if(r.error){toast('回复失败: '+r.error.message,'err');return;}
        loadOpinionList();
        writeLog('回复意见','suggestion',id,'');
        toast('已回复 ✅','ok');
    });
}

function togglePinOpinion(id, pin){
    supabase.from('suggestions').update({pinned:pin}).eq('id',id).then(function(r){
        if(r.error){toast('操作失败','err');return;}
        loadOpinionList();
        writeLog(pin?'置顶意见':'取消置顶','suggestion',id,'');
        toast(pin?'已置顶':'已取消置顶','ok');
    });
}

function deleteOpinion(id){
    if(!confirm('确定删除这条意见？'))return;
    supabase.from('suggestions').delete().eq('id',id).then(function(r){
        if(r.error){toast('删除失败: '+r.error.message,'err');return;}
        loadOpinionList();
        writeLog('删除意见','suggestion',id,'');
        toast('已删除','ok');
    });
}

var wallSort='department';

function buildWall(container){
    var html='<div class="card"><div class="card-header"><span>👥 社员通讯录</span>';
    html+='<div style="display:flex;gap:6px;">';
    html+='<input type="text" id="wallSearch" placeholder="🔍 搜索..." oninput="loadWall()" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:.8rem;max-width:150px;">';
    html+='<select id="wallSort" onchange="wallSort=this.value;loadWall();" style="padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:.75rem;">';
    html+='<option value="department">按部门</option><option value="name">按姓名</option><option value="active">按活跃</option></select>';
    html+='<button class="btn btn-outline btn-xs" onclick="exportWall()">📥 导出</button>';
    html+='</div></div>';
    html+='<div id="wallContent" style="padding:14px 18px;">加载中...</div></div>';
    container.innerHTML=html;
    loadWall();
}

function loadWall(){
    var search=(document.getElementById('wallSearch')||{}).value||'';
    var sort=wallSort;
    var orderCol=sort==='name'?'display_name':(sort==='active'?'last_seen':'department');
    var asc=sort==='name'?true:(sort==='active'?false:true);
    supabase.from('profiles').select('*').order(orderCol,{ascending:asc}).then(function(r){
        var el=document.getElementById('wallContent');
        if(!el)return;
        var data=r.data||[];
        if(search){
            var s=search.toLowerCase();
            data=data.filter(function(d){
                return (d.display_name||'').toLowerCase().indexOf(s)!==-1 || (d.department||'').toLowerCase().indexOf(s)!==-1 || (d.class_name||'').toLowerCase().indexOf(s)!==-1;
            });
        }
        if(data.length===0){el.innerHTML='<div style="text-align:center;padding:32px;color:#888;">无匹配成员</div>';return;}
        var now=new Date();
        var depts={};
        for(var k=0;k<data.length;k++){
            var d=data[k].department||'未分组';
            if(!depts[d])depts[d]=[];
            depts[d].push(data[k]);
        }
        var deptOrder=['采访部','摄影部','剪辑部','策划部','后勤部','财务部','未分组'];
        var h='';
        for(var di=0;di<deptOrder.length;di++){
            var dn=deptOrder[di];
            if(!depts[dn])continue;
            h+='<div style="margin-bottom:14px;">';
            h+='<div style="font-weight:700;font-size:.85rem;margin-bottom:6px;color:#64748b;">📌 '+dn+'（'+depts[dn].length+'人）</div>';
            for(var mi=0;mi<depts[dn].length;mi++){
                var m=depts[dn][mi];
                var isOnline=false;
                if(m.last_seen){
                    var last=new Date(m.last_seen);
                    if((now-last)/60000<5)isOnline=true;
                }
                var roleLabel=roleNames[m.role]||'';
                h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:.82rem;cursor:pointer;" onclick="showMemberCard(\''+m.id+'\')">';
                h+='<div style="display:flex;align-items:center;gap:8px;">';
                h+='<span style="width:8px;height:8px;border-radius:50%;display:inline-block;background:'+(isOnline?'#10b981':'#d1d5db')+';"></span>';
                h+='<div>';
                h+='<div style="font-weight:500;">'+escHtml(m.display_name||'(未设置)')+'</div>';
                h+='<div style="font-size:.7rem;color:var(--muted);">';
                if(m.class_name)h+=escHtml(m.class_name)+' · ';
                h+=escHtml(roleLabel);
                h+='</div></div></div>';
                h+='<div style="font-size:.7rem;color:var(--muted);text-align:right;">';
                if(m.qq)h+='QQ:'+escHtml(m.qq)+' ';
                if(m.phone)h+='📱'+escHtml(m.phone);
                if(!m.qq&&!m.phone)h+='-';
                h+='</div></div>';
            }
            h+='</div>';
        }
        el.innerHTML=h;
    });
}

function showMemberCard(uid){
    supabase.from('profiles').select('*').eq('id',uid).single().then(function(r){
        if(r.error||!r.data){toast('加载失败','err');return;}
        var m=r.data;
        var isSelf=m.id===currentUser.id;
        var isAdmin=hasRole('super_admin','president');
        var canEdit=isSelf||isAdmin;
        var roleLabel=roleNames[m.role]||'';
        var now=new Date();
        var isOnline=false;
        if(m.last_seen){
            var last=new Date(m.last_seen);
            if((now-last)/60000<15)isOnline=true;
        }
        var h='<div style="text-align:center;margin-bottom:16px;">';
        h+='<div style="font-size:3rem;">'+(isOnline?'🟢':'🔘')+'</div>';
        h+='<div style="font-size:1.2rem;font-weight:700;">'+escHtml(m.display_name||'未设置')+'</div>';
        h+='<div style="font-size:.8rem;color:var(--muted);">'+escHtml(roleLabel)+'</div>';
        h+='</div>';
        h+='<div class="kv"><span class="k">部门</span><span class="v">'+escHtml(m.department||'-')+'</span></div>';
        h+='<div class="kv"><span class="k">班级</span><span class="v">'+escHtml(m.class_name||'-')+'</span></div>';
        h+='<div class="kv"><span class="k">QQ</span><span class="v">'+escHtml(m.qq||'-')+'</span></div>';
        h+='<div class="kv"><span class="k">电话</span><span class="v">'+escHtml(m.phone||'-')+'</span></div>';
        if(m.last_seen)h+='<div class="kv"><span class="k">最近活跃</span><span class="v">'+toBJTime(m.last_seen) +'</span></div>';
        document.getElementById('detailContent').innerHTML=h;
        document.getElementById('detailActions').innerHTML=
            (canEdit?'<button class="btn btn-outline btn-sm" onclick="editMemberCard(\''+m.id+'\',\''+escAttr(m.display_name||'')+'\',\''+escAttr(m.department||'')+'\',\''+escAttr(m.class_name||'')+'\',\''+escAttr(m.qq||'')+'\',\''+escAttr(m.phone||'')+'\');closeDetail();">✏️ 编辑</button> ':'')+
            '<button class="btn btn-outline btn-sm" onclick="closeDetail()">关闭</button>';
        document.getElementById('detailModal').classList.add('show');
        document.body.style.overflow='hidden';
    });
}

function editMemberCard(uid,name,dept,cls,qq,phone){
    var isAdmin=hasRole('super_admin','president');
    var isSelf=uid===currentUser.id;

    // 管理员可改全部，普通成员只能改班级/QQ/电话
    if(isAdmin||isSelf){
        var newClass=prompt('班级：',cls||'');if(newClass===null)return;newClass=newClass.trim();
        var newQq=prompt('QQ：',qq||'');if(newQq===null)return;newQq=newQq.trim();
        var newPhone=prompt('电话：',phone||'');if(newPhone===null)return;newPhone=newPhone.trim();

        var updateData={};
        if(newClass!==(cls||''))updateData.class_name=newClass;
        if(newQq!==(qq||''))updateData.qq=newQq;
        if(newPhone!==(phone||''))updateData.phone=newPhone;

        // 管理员额外可以改姓名和部门
        if(isAdmin){
            var newName=prompt('名称（管理员）：',name||'');if(newName===null)return;newName=newName.trim();
            var newDept=prompt('部门（管理员）：',dept||'');if(newDept===null)return;newDept=newDept.trim();
            if(newName!==(name||''))updateData.display_name=newName;
            if(newDept!==(dept||''))updateData.department=newDept;
        }

        if(Object.keys(updateData).length===0){toast('未修改','err');return;}
        supabase.from('profiles').update(updateData).eq('id',uid).then(function(r){
            if(r.error){toast('更新失败: '+r.error.message,'err');return;}
            toast('已更新 ✅','ok');
            writeLog('编辑成员信息','profile',uid,JSON.stringify(updateData));
            if(uid===currentUser.id){
                if(updateData.display_name)currentUser.display_name=updateData.display_name;
                if(updateData.department)currentUser.department=updateData.department;
                document.getElementById('userName').textContent=currentUser.display_name||currentUser.department||'用户';
            }
            loadWall();
        });
    }
}

function exportWall(){
    supabase.from('profiles').select('display_name,department,class_name,qq,phone').order('department').then(function(r){
        var data=r.data||[];
        var txt='姓名,部门,班级,QQ,电话\n';
        for(var i=0;i<data.length;i++){
            var d=data[i];
            txt+='"'+(d.display_name||'')+'","'+(d.department||'')+'","'+(d.class_name||'')+'","'+(d.qq||'')+'","'+(d.phone||'')+'"\n';
        }
        var blob=new Blob(['\uFEFF'+txt],{type:'text/plain;charset=utf-8'});
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');a.href=url;a.download='通讯录_'+getLocalDate()+'.csv';
        document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
        toast('导出成功','ok');
    });
}

// ==========================================
// 9. 签到（完整版）
// ==========================================
var checkinYear, checkinMonth;

function buildCheckin(container){
    var now=new Date();
    checkinYear=now.getFullYear();
    checkinMonth=now.getMonth()+1;
    var html='<div class="card"><div class="card-header"><span>✅ 每日签到</span>';
    html+='<div style="display:flex;align-items:center;gap:8px;font-size:.9rem;">';
    html+='<button class="btn btn-xs btn-outline" onclick="changeCheckinMonth(-1)">◀</button>';
    html+='<span style="font-weight:700;" id="calTitle"></span>';
    html+='<button class="btn btn-xs btn-outline" onclick="changeCheckinMonth(1)">▶</button>';
    html+='</div></div>';
    html+='<div style="display:flex;gap:14px;flex-wrap:wrap;padding:18px;">';
    html+='<div style="flex:1;min-width:280px;">';
    html+='<div style="text-align:center;margin-bottom:14px;" id="checkinTop">';
    html+='<div style="font-size:2.5rem;" id="checkinEmoji">📅</div>';
    html+='<div style="font-size:1.1rem;font-weight:700;" id="checkinStatus">加载中...</div>';
    html+='<div style="font-size:.85rem;color:var(--muted);" id="checkinStreak">加载中...</div>';
    html+='</div>';
    html+='<button class="btn btn-green" id="checkinBtn" onclick="doCheckin()" style="margin:0 auto;display:block;">✅ 签到</button>';
    html+='<div id="calGrid" style="margin-top:16px;display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;"></div>';
    html+='</div>';
    html+='<div style="flex:0 0 220px;min-width:200px;">';
    html+='<div style="font-weight:600;font-size:.85rem;margin-bottom:8px;">📊 签到统计</div>';
    html+='<div style="font-size:.8rem;color:var(--muted);" id="checkinStats">加载中...</div>';
    html+='<div style="font-weight:600;font-size:.85rem;margin-top:14px;margin-bottom:8px;">🏆 今日签到榜</div>';
    html+='<div style="font-size:.78rem;" id="checkinRanking">加载中...</div>';
    html+='<div style="font-weight:600;font-size:.85rem;margin-top:14px;margin-bottom:8px;">📈 本周签到趋势</div>';
    html+='<div style="font-size:.78rem;" id="checkinWeekly">加载中...</div>';
    html+='</div></div></div>';
    container.innerHTML=html;
    loadCheckinAll();
}

function changeCheckinMonth(delta){
    checkinMonth+=delta;
    if(checkinMonth<1){checkinMonth=12;checkinYear--;}
    if(checkinMonth>12){checkinMonth=1;checkinYear++;}
    loadCheckinAll();
}

function loadCheckinAll(){
    var today=getLocalDate();
    document.getElementById('calTitle').textContent=checkinYear+'年 '+checkinMonth+'月';

    // 签到状态
    supabase.from('checkins').select('*').eq('user_id',currentUser.id).eq('check_date',today).single().then(function(r){
        document.getElementById('checkinEmoji').textContent=r.data?'✅':'📅';
        document.getElementById('checkinStatus').textContent=r.data?'今日已签到 ✓':'今天还没签到';
        var btn=document.getElementById('checkinBtn');
        if(r.data){btn.textContent='✅ 已签到';btn.className='btn btn-outline';btn.disabled=true;}
        else{btn.textContent='✅ 签到';btn.className='btn btn-green';btn.disabled=false;}
    });

    // 连续天数
    supabase.from('checkins').select('check_date').eq('user_id',currentUser.id).order('check_date',{ascending:false}).limit(60).then(function(r){
        var data=r.data||[];
        var streak=0;
        var d=new Date();
        for(var i=0;i<60;i++){
            var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            var found=data.some(function(x){return x.check_date===ds;});
            if(found){streak++;d.setDate(d.getDate()-1);}
            else{if(i===0){d.setDate(d.getDate()-1);continue;}else break;}
        }
        document.getElementById('checkinStreak').textContent='🔥 连续签到 '+streak+' 天';
    });

    // 月历
    renderCalendar();

    // 统计
    loadCheckinStats();

    // 排行榜
    loadCheckinRanking();

    // 周趋势
    loadCheckinWeekly();
}

function renderCalendar(){
    var grid=document.getElementById('calGrid');
    if(!grid)return;
    var days=['日','一','二','三','四','五','六'];
    var h='';
    for(var i=0;i<7;i++)h+='<div style="font-size:.7rem;font-weight:600;color:var(--muted);">'+days[i]+'</div>';
    var firstDay=new Date(checkinYear,checkinMonth-1,1).getDay();
    var totalDays=new Date(checkinYear,checkinMonth,0).getDate();
    var todayStr=getLocalDate();

    // 先填充空白格和未标记的日期（骨架）
    for(var d=0;d<firstDay;d++)h+='<div></div>';
    for(var day=1;day<=totalDays;day++){
        var ds=checkinYear+'-'+String(checkinMonth).padStart(2,'0')+'-'+String(day).padStart(2,'0');
        var isToday=ds===todayStr;
        h+='<div style="padding:6px 2px;border-radius:6px;font-size:.75rem;'+(isToday?'border:2px solid #2563eb;':'')+'">'+day+'</div>';
    }
    grid.innerHTML=h;

    // 异步查询后更新标记
    supabase.from('checkins').select('check_date').eq('user_id',currentUser.id).gte('check_date',checkinYear+'-'+String(checkinMonth).padStart(2,'0')+'-01').lte('check_date',checkinYear+'-'+String(checkinMonth).padStart(2,'0')+'-'+totalDays).then(function(r){
        var checkedDates=(r.data||[]).map(function(x){return x.check_date;});
        // 只更新已签到的格子背景色
        var cells=grid.querySelectorAll('div');
        // 跳过前 7 个（星期标题）+ firstDay 个空白格
        var offset=7+firstDay;
        for(var day=1;day<=totalDays;day++){
            var ds=checkinYear+'-'+String(checkinMonth).padStart(2,'0')+'-'+String(day).padStart(2,'0');
            var idx=offset+day-1;
            if(idx<cells.length && checkedDates.indexOf(ds)!==-1){
                cells[idx].style.background='#d1fae5';
                cells[idx].style.fontWeight='700';
            }
        }
    });
}

function loadCheckinStats(){
    var monthStart=checkinYear+'-'+String(checkinMonth).padStart(2,'0')+'-01';
    var totalDays=new Date(checkinYear,checkinMonth,0).getDate();
    var monthEnd=checkinYear+'-'+String(checkinMonth).padStart(2,'0')+'-'+totalDays;
    supabase.from('checkins').select('id',{count:'exact'}).eq('user_id',currentUser.id).gte('check_date',monthStart).lte('check_date',monthEnd).then(function(r){
        var monthCount=r.count||0;
        supabase.from('checkins').select('id',{count:'exact'}).eq('user_id',currentUser.id).then(function(r2){
            var totalCount=r2.count||0;
            document.getElementById('checkinStats').innerHTML='本月签到：<b>'+monthCount+'</b> 天<br>累计签到：<b>'+totalCount+'</b> 天<br>本月出勤率：<b>'+(totalDays>0?(monthCount/totalDays*100).toFixed(1):0)+'%</b>';
        });
    });
}

function loadCheckinRanking(){
    var today=getLocalDate();
    supabase.from('checkins').select('user_id,created_at').eq('check_date',today).order('created_at').limit(20).then(function(r){
        var el=document.getElementById('checkinRanking');
        if(!el)return;
        var data=r.data||[];
        if(data.length===0){el.innerHTML='<span style="color:var(--muted);">还没有人签到</span>';return;}

        // 先获取所有用户 ID，批量查名字
        var userIds=[];
        for(var i=0;i<Math.min(data.length,10);i++){
            userIds.push(data[i].user_id);
        }

        // 一次性查询所有用户名字
        supabase.from('profiles').select('id,display_name').in('id',userIds).then(function(r2){
            // 建映射表
            var nameMap={};
            var profiles=r2.data||[];
            for(var j=0;j<profiles.length;j++){
                nameMap[profiles[j].id]=profiles[j].display_name||'未知';
            }

            var medals=['🥇','🥈','🥉'];
            var h='';
            for(var k=0;k<Math.min(data.length,10);k++){
                var prefix=k<3?medals[k]+' ':(k+1)+'. ';
                var name=nameMap[data[k].user_id]||'...';
                h+='<div style="padding:3px 0;border-bottom:1px solid #f1f5f9;">'+prefix+'<span style="color:#2563eb;cursor:pointer;" onclick="showMemberCard(\''+data[k].user_id+'\')">'+escHtml(name)+'</span> <span style="font-size:.7rem;color:var(--muted);">'+(function(ts){ if(!ts) return '--:--'; var t = new Date(ts); return String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0'); })(data[k].created_at)+'</span></div>';
            }
            el.innerHTML=h;
        });
    });
}

function loadCheckinWeekly(){
    var el=document.getElementById('checkinWeekly');
    if(!el)return;
    var labels=['周一','周二','周三','周四','周五','周六','周日'];
    var counts=[0,0,0,0,0,0,0];
    var now=new Date();
    var dayOfWeek=now.getDay();
    var monday=new Date(now);
    monday.setDate(now.getDate()-(dayOfWeek===0?6:dayOfWeek-1));
    monday.setHours(0,0,0,0);

    var promises=[];
    for(var i=0;i<7;i++){
        var d=new Date(monday);
        d.setDate(monday.getDate()+i);
        var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        (function(idx,ds){
            promises.push(supabase.from('checkins').select('id',{count:'exact'}).eq('check_date',ds));
        })(i,ds);
    }
    Promise.all(promises).then(function(results){
        for(var i=0;i<results.length;i++){counts[i]=results[i].count||0;}
        var maxCount=Math.max.apply(null,counts)||1;
        var h='';
        for(var j=0;j<7;j++){
            var barW=Math.max(counts[j]/maxCount*100,2);
            var isToday=j===(dayOfWeek===0?6:dayOfWeek-1);
            h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:.73rem;">';
            h+='<span style="width:32px;text-align:right;'+(isToday?'font-weight:700;':'')+'">'+labels[j]+'</span>';
            h+='<div style="flex:1;background:#e5e7eb;border-radius:4px;height:16px;"><div style="width:'+barW+'%;height:100%;background:'+(isToday?'#2563eb':'#10b981')+';border-radius:4px;min-width:2px;"></div></div>';
            h+='<span style="width:20px;">'+counts[j]+'</span></div>';
        }
        el.innerHTML=h;
    });
}

function doCheckin(){
    var today=getLocalDate();
    var btn=document.getElementById('checkinBtn');
    btn.disabled=true;btn.textContent='签到中...';
    supabase.from('checkins').insert([{user_id:currentUser.id,check_date:today,is_manual:false}]).then(function(r){
        if(r.error){
            if(r.error.message.indexOf('duplicate')!==-1)toast('今天已经签到过了','err');
            else toast('签到失败: '+r.error.message,'err');
            loadCheckinAll();
            return;
        }
        toast('签到成功 ✅','ok');
        writeLog('签到','checkin',currentUser.id,'');
        loadCheckinAll();
    });
}
        function heartbeat(){
    if(!currentUser || !currentUser.id) return;
    supabase.from('profiles').update({last_seen: new Date().toISOString()}).eq('id', currentUser.id).then(function(){});
}
setInterval(heartbeat, 10000);
heartbeat();
